<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Mematikan zoom di perangkat Mobile (HP) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Content Viewer</title>
    
    <style>
        /* RESET DASAR & TEMA MODERN */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #334155; 
            margin: 0; 
            /* Latar belakang cerah dan bersih */
            background: #f8fafc; 
            min-height: 100vh;
            line-height: 1.6;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* HEADER MODERN (Glassmorphism effect) */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
            letter-spacing: -0.5px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        /* CONTAINER FORM (Tengah Layar) */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 65px);
            padding: 20px;
        }

        /* CARD STYLE (Soft Shadow & Rounded) */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(226, 232, 240, 0.5);
            transition: transform 0.3s ease;
        }

        h2 { 
            margin: 0 0 8px 0; 
            font-size: 24px; 
            font-weight: 700;
            color: #0f172a; 
            letter-spacing: -0.5px;
        }
        
        p { 
            color: #64748b; 
            font-size: 15px; 
            margin-bottom: 24px; 
            line-height: 1.5;
        }

        /* INPUT & TEXTAREA MODERN */
        textarea, input { 
            width: 100%; 
            padding: 14px 16px; 
            font-size: 15px; 
            background: #f1f5f9;
            border: 2px solid transparent; 
            border-radius: 12px; 
            outline: none; 
            margin-bottom: 16px; 
            font-family: inherit;
            box-sizing: border-box;
            color: #1e293b;
            transition: all 0.25s ease;
        }
        
        textarea::placeholder, input::placeholder {
            color: #94a3b8;
        }

        textarea:focus, input:focus { 
            background: #ffffff;
            border-color: #3b82f6; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        textarea { resize: vertical; min-height: 120px; }

        /* BUTTON MODERN */
        button.btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff; 
            border: none; 
            padding: 14px; 
            font-size: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        button.btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        button.btn:active {
            transform: translateY(0);
        }

        button.btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            color: #f8fafc;
        }

        #result-box {
            padding-top: 20px;
            border-top: 1px dashed #e2e8f0;
        }

        /* =========================================
           TAMPILAN ISI KONTEN (PASTELINK STYLE)
           ========================================= */
        #content-wrapper {
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content-box {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            white-space: pre-wrap; 
            font-size: 16px;
            color: #334155;
            line-height: 1.8;
        }

        /* CUSTOM LINK STYLE */
        .link-asli {
            color: #2563eb; 
            text-decoration: none; 
            font-weight: 500;
            border-bottom: 1px dashed #93c5fd;
            word-break: break-word; 
            overflow-wrap: anywhere; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        
        .link-asli:hover {
            color: #1d4ed8;
            border-bottom: 1px solid #1d4ed8;
            background: rgba(59, 130, 246, 0.05);
        }

        .link-asli.link-merah {
            color: #ef4444 !important; 
            border-bottom-color: #fca5a5 !important;
        }
        .link-asli.link-merah:hover {
            color: #dc2626 !important; 
            border-bottom-style: solid;
            background: rgba(239, 68, 68, 0.05);
        }

        /* ANIMASI SPINNER & MUNCUL */
        .spinner { 
            animation: spin 1s linear infinite; 
            display: none; 
            margin-right: 10px; 
            vertical-align: middle; 
        }
        
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        Chikuruya
    </div>

    <!-- MODE BUAT KONTEN -->
    <div class="form-container" id="create-wrapper" style="display: none;">
        <div class="card">
            <h2>Buat Link Baru</h2>
            <p>Masukkan teks atau list link video di bawah ini.</p>
            <textarea id="input-text" placeholder="1. https://l.pokoco.co/3k_eN1Fi5&#10;2. https://gofile.io/d/A1B2C3&#10;3. https://link.com/video.mp4" rows="8"></textarea>
            <button onclick="generateLink()" class="btn" id="btn-submit">Submit</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn" onclick="copyLink()">Salin URL</button>
            </div>
        </div>
    </div>

    <!-- MODE VERIFIKASI -->
    <div class="form-container" id="verify-wrapper" style="display: none;">
        <div class="card" style="text-align: center;">
            <h2>Verifikasi</h2>
            <p>Klik tombol di bawah untuk membuktikan bahwa Anda bukan robot.</p>
            <button class="btn" id="btn-robot" onclick="triggerVerify()" style="width: auto; padding: 14px 36px; margin: 0 auto;">
                <svg class="spinner" id="spinner-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btn-text">Saya Manusia</span>
            </button>
        </div>
    </div>

    <!-- MODE LIHAT KONTEN -->
    <div id="content-wrapper">
        <div class="content-box" id="view-mode"></div>
    </div>

    <script>
        /* =========================================
           PROTEKSI HALAMAN (Klik Kanan & Zoom)
           ========================================= */
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) { e.preventDefault(); } });


        /* =========================================
           SISTEM IKLAN BERGANTIAN (ROTASI MEMORI)
           ========================================= */
        const adLinks =[
            "https://conductivebreeds.com/rznx5d1wbr?key=dfe7ca4b20f77f2354da2aba17d12048",
            "https://omg10.com/4/10390860"
        ];

        function getNextAdUrl() {
            // Ambil memori index dari browser (localStorage), mulai dari 0 jika belum ada
            let currentIndex = parseInt(localStorage.getItem('ad_index')) || 0;
            
            // Dapatkan URL iklan sesuai urutan
            let adUrl = adLinks[currentIndex];
            
            // Siapkan index untuk klik selanjutnya (Ganjil-Genap berulang)
            let nextIndex = (currentIndex + 1) % adLinks.length;
            localStorage.setItem('ad_index', nextIndex);
            
            return adUrl;
        }

        /* =========================================
           FUNGSI UTAMA
           ========================================= */
        let contentId = null;

        function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                contentId = id;
                // Mengubah dari sessionStorage ke localStorage agar tab baru bisa membaca status verifikasi
                const isVerified = localStorage.getItem('verified_' + contentId);
                if (isVerified === 'true') {
                    fetchAndLoadContent();
                } else {
                    document.getElementById('verify-wrapper').style.display = 'flex';
                }
            } else {
                document.getElementById('create-wrapper').style.display = 'flex';
            }
        }

        // --- UPDATE: TOMBOL VERIFIKASI (Buka Konten di Tab Baru, Tab Lama jadi Iklan) ---
        function triggerVerify() {
            const btn = document.getElementById('btn-robot');
            const spinner = document.getElementById('spinner-icon');
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            document.getElementById('btn-text').innerText = "Loading...";

            // Tandai sudah diverifikasi di memori, agar tab baru otomatis bypass verifikasi
            localStorage.setItem('verified_' + contentId, 'true');

            // Coba buka URL halaman ini sendiri di TAB BARU (otomatis masuk mode konten)
            let newWindow = null;
            try {
                newWindow = window.open(window.location.href, '_blank');
            } catch(e) {
                console.error("Window open error:", e);
            }

            // Pengecekan Jika Adblock/Popup Blocker Mencegah Tab Baru Terbuka
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk melihat konten.");
                
                // Reset kembali UI dan status karena gagal
                btn.disabled = false;
                spinner.style.display = 'none';
                document.getElementById('btn-text').innerText = "Saya Manusia";
                localStorage.removeItem('verified_' + contentId);
            } else {
                // Berhasil buka tab baru, arahkan tab UTAMA (saat ini) ke Iklan
                window.location.href = getNextAdUrl();
            }
        }

        // --- UPDATE: KLIK LINK KONTEN (Buka Video di Tab Baru, Tab Lama jadi Iklan) ---
        function openLinkSafe(event, el) {
            event.preventDefault(); 
            const url = el.href; 

            el.classList.add('link-merah');
            
            // Coba buka Link Video di TAB BARU
            let newWindow = null;
            try {
                newWindow = window.open(url, '_blank');
            } catch(e) {
                console.error("Window open error:", e);
            }
            
            // Pengecekan Jika Adblock/Popup Blocker Menyala
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk membuka link ini.");
            } else {
                newWindow.opener = null; // Security rule
                // Berhasil buka video di tab baru, arahkan tab UTAMA ke Iklan
                window.location.href = getNextAdUrl();
            }
        }

        function randomizeDisplayUrl(url) {
            try {
                let parsed = new URL(url);
                let paths = parsed.pathname.split('/');
                let targetIndex = -1;
                for (let i = paths.length - 1; i >= 0; i--) {
                    if (paths[i].length > 0) {
                        targetIndex = i;
                        break;
                    }
                }
                if (targetIndex !== -1) {
                    let targetSegment = paths[targetIndex];
                    let dotIndex = targetSegment.lastIndexOf('.');
                    let baseName = targetSegment;
                    let extension = '';
                    if (dotIndex > 0) {
                        baseName = targetSegment.substring(0, dotIndex);
                        extension = targetSegment.substring(dotIndex);
                    }
                    let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let randomId = '';
                    for (let i = 0; i < baseName.length; i++) {
                        if (/[a-zA-Z0-9]/.test(baseName[i])) {
                            randomId += chars.charAt(Math.floor(Math.random() * chars.length));
                        } else {
                            randomId += baseName[i];
                        }
                    }
                    paths[targetIndex] = randomId + extension; 
                    parsed.pathname = paths.join('/');
                    return parsed.toString();
                }
            } catch(e) {
                return url; 
            }
            return url;
        }

        async function fetchAndLoadContent() {
            try {
                // HAPUS COMMENT DI BAWAH JIKA SUDAH DISAMBUNG KE SERVER
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error();
                const data = await res.json();

                // Ubah ke localStorage agar tab yang dibuka selaras statusnya
                localStorage.setItem('verified_' + contentId, 'true');

                setTimeout(() => {
                    document.getElementById('verify-wrapper').style.display = 'none';
                    document.getElementById('content-wrapper').style.display = 'block';
                    
                    document.getElementById('view-mode').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        let displayUrl = randomizeDisplayUrl(url);
                        return `<a href="${url}" class="link-asli" onclick="openLinkSafe(event, this)">${displayUrl}</a>`;
                    });
                }, 500);
            } catch (e) {
                alert("Data tidak ditemukan atau sudah kedaluwarsa.");
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Loading...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Gagal membuat link."); }
            btn.disabled = false;
            btn.innerText = "Submit";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Tersalin!";
            setTimeout(() => btn.innerText = "Salin URL", 2000);
        }

        init();
    </script>
</body>
</html>
