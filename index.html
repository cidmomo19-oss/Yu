<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Viewer</title>
    <style>
        /* TAMPILAN BERSIH ASLI (Tanpa embel-embel aneh) */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        textarea:focus, input:focus { border-color: #000000; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #333333; }
        
        .copy-group { display: flex; gap: 10px; }
        .copy-group input { margin-bottom: 0; }
        .copy-group button { white-space: nowrap; }

        /* Ini cuma BAJU-nya doang link, isinya adalah tombol tersembunyi */
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; }
        .link-blue:hover { text-decoration: underline; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT PESAN -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <p style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold;">LINK BERHASIL DIBUAT:</p>
                <div class="copy-group">
                    <input type="text" id="result-url" readonly onclick="this.select()">
                    <button id="btn-copy" onclick="copyLink()">Salin</button>
                </div>
            </div>
        </div>

        <!-- MODE BACA PESAN -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <!-- MODAL COPY CUSTOM (Pengganti modal Bootstrap agar tampilan tetap bersih) -->
    <div id="vanillaCopyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: white; padding: 25px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h3 style="margin-top: 0; font-size: 18px; font-weight: bold;">Bypass Pixeldrain</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Tekan tombol Salin, buka Tab Baru di browser, lalu Paste link tersebut secara manual.</p>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="copyUrlInput" readonly style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; outline: none; margin-bottom: 0;">
                <button onclick="doCopy()" id="btnCopy" style="padding: 10px 15px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Salin</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA IKLAN ---
        const ADS =[
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9", 
            "https://omg10.com/4/10390860"
        ];

        // "BRANKAS" PENYIMPANAN URL (Sama seperti `_0xStore` di versi tombol)
        let _0xStore =[];

        // Objek tiruan agar perintah "copyModal.show()" dari versi tombol tetap jalan
        const copyModal = {
            show: function() { document.getElementById('vanillaCopyModal').style.display = 'flex'; }
        };

        function showCreateMode() {
            document.getElementById('create-mode').style.display = 'block';
            document.getElementById('view-mode').style.display = 'none';
        }

        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';
            
            _0xStore =[]; // Kosongkan brankas setiap kali render ulang
            
            // Arsitektur ini meniru 100% cara versi tombol menyimpan link
            const linkedText = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                // 1. Simpan URL yang sudah di-encode ke dalam brankas
                _0xStore.push({ type: 'single', u: btoa(url) });
                let currentIndex = _0xStore.length - 1;
                
                // 2. Buat "tombol" palsu yang menyamar jadi link biru
                return '<span class="link-blue" onclick="handleClick(' + currentIndex + ')">' + url + '</span>';
            });
            
            viewDiv.innerHTML = linkedText;
        }

        // ==========================================================
        // SEMUA FUNGSI DI BAWAH INI 100% HASIL COPY-PASTE DARI KODE VERSI TOMBOL
        // TIDAK ADA PERUBAHAN SAMA SEKALI
        // ==========================================================
        
        function handleClick(index) {
            prepareFinalAction(index);
        }

        function prepareFinalAction(index) {
            const item = _0xStore[index];
            if (!item) return;

            if (item.type === 'single') {
                executeRedirect(atob(item.u));
            }
        }

        function executeRedirect(url) {
            // 1. Modifikasi Link Pixeldrain
            if (url.includes('pixeldrain.com/api/file/')) {
                url = url.replace('/api/file/', '/u/');
            }

            // 2. Cek Modal Copy (Khusus API Pixeldrain yg gagal convert)
            if (url.includes('pixeldrain.com/api/file')) {
                document.getElementById('copyUrlInput').value = url;
                copyModal.show();
                return;
            }

            // --- START LOGIKA DUPLIKAT IKLAN (STEALTH MODE) ---
            
            // A. Buka Iklan PERTAMA di Tab Baru (Mencoba bypass popup blocker)
            try { 
                window.open(ADS[0], '_blank'); 
            } catch(e) {}

            // B. Buka LINK ASLI (Konten) di Tab Baru
            let contentWindow = window.open(url, '_blank');

            // Safety Check: Jika browser memblokir Link Asli karena ada 2 window.open sebelumnya
            if (!contentWindow) {
                // Jika konten terblokir, kita batalkan iklan kedua dan pakai tab ini untuk konten
                window.location.href = url;
            } else {
                // C. Jika Konten berhasil dibuka di tab baru,
                // Maka Tab Lama ini kita ganti jadi Iklan KEDUA
                window.location.href = ADS[1];
            }
        }

        function doCopy() {
            const input = document.getElementById("copyUrlInput");
            input.select();
            input.setSelectionRange(0, 99999);
            
            let success = false;
            try {
                document.execCommand("copy");
                success = true;
            } catch(e) {
                if(navigator.clipboard) {
                    navigator.clipboard.writeText(input.value);
                    success = true;
                }
            }

            if(success) {
                const btn = document.getElementById("btnCopy");
                btn.innerHTML = 'Tersalin!';
                btn.style.backgroundColor = "#28a745";
                setTimeout(() => {
                    btn.innerHTML = 'Salin';
                    btn.style.backgroundColor = "#000";
                    // Karena tidak pakai bootstrap, modalnya disembunyikan manual
                    document.getElementById('vanillaCopyModal').style.display = 'none';
                    window.location.href = ADS[Math.floor(Math.random() * ADS.length)];
                }, 1500);
            } else {
                alert("Browser tidak mendukung salin otomatis. Silakan blok tulisan dan salin manual.");
            }
        }
        
        // ==========================================================

        async function init() {
            const id = window.location.pathname.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + id);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    
                    showViewMode(data.content);
                } catch (e) {
                    showCreateMode();
                }
            } else {
                showCreateMode();
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Loading...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                
                const finalUrl = window.location.origin + '/' + data.id;
                document.getElementById('result-url').value = finalUrl;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) {
                alert("Gagal konek ke KV Database!");
            }
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Tersalin!";
            btn.style.backgroundColor = "#28a745";
            
            setTimeout(() => {
                btn.innerText = "Salin";
                btn.style.backgroundColor = "#000000";
            }, 2000);
        }

        // Anti Inspect
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S'))) {
                e.preventDefault();
            }
        });

        init();
    </script>

</body>
</html>
