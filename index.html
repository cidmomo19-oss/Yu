<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- KEAMANAN: Mematikan Referrer Global -->
    <meta name="referrer" content="no-referrer">
    
    <title>Secure Content Viewer</title>

    <!-- Font Modern: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & BASE */
        body { 
            font-family: 'Inter', sans-serif;
            color: #334155; 
            margin: 0; 
            /* Background gradien bersih & cerah */
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
            min-height: 100vh;
            line-height: 1.6;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* HEADER MODERN (Glassmorphism) */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 24px;
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* CONTAINER */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
            box-sizing: border-box;
        }

        /* KARTU (Modern Card) */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 10px rgba(0, 0, 0, 0.02);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.3s ease;
        }

        h2 { 
            margin: 0 0 8px 0; 
            font-size: 24px; 
            color: #0f172a; 
            font-weight: 700;
        }
        
        p { 
            color: #64748b; 
            font-size: 15px; 
            margin-bottom: 24px; 
        }

        /* INPUT & TEXTAREA MODERN */
        textarea, input { 
            width: 100%; 
            padding: 14px 16px; 
            font-size: 15px; 
            background: #f8fafc;
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            outline: none; 
            margin-bottom: 20px; 
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
            color: #1e293b;
        }
        
        textarea { resize: vertical; min-height: 120px; }
        
        textarea:focus, input:focus { 
            background: #ffffff;
            border-color: #3b82f6; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* TOMBOL (Gradient & Animasi) */
        button.btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff; 
            border: none; 
            padding: 14px; 
            font-size: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        button.btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        
        button.btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        /* KONTEN (PASTELINK STYLE MODERN) */
        #content-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            display: none;
        }

        .content-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            white-space: pre-wrap; 
            font-size: 16px;
            color: #334155;
            line-height: 1.8;
            border: 1px solid #f1f5f9;
        }

        .link-asli {
            color: #2563eb; 
            text-decoration: none;
            font-weight: 500;
            word-break: break-word; 
            overflow-wrap: anywhere; 
            cursor: pointer; 
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.2s ease, color 0.2s ease;
        }
        
        .link-asli:hover {
            background: #eff6ff;
            color: #1d4ed8;
            text-decoration: underline;
        }

        .link-asli.link-merah {
            color: #ef4444 !important; 
        }
        .link-asli.link-merah:hover {
            background: #fef2f2;
            color: #b91c1c !important; 
        }

        /* SPINNER */
        .spinner { animation: spin 1s linear infinite; display: none; margin-right: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        Chikuruya
    </div>

    <!-- MODE BUAT KONTEN -->
    <div class="form-container" id="create-wrapper" style="display: none;">
        <div class="card">
            <h2>Buat Link Baru</h2>
            <p>Masukkan teks atau list link video di bawah ini.</p>
            <textarea id="input-text" placeholder="1. https://l.pokoco.co/3k_eN1Fi5&#10;2. https://gofile.io/d/A1B2C3&#10;3. https://link.com/video.mp4" rows="6"></textarea>
            <button onclick="generateLink()" class="btn" id="btn-submit">Submit</button>
            
            <div id="result-box" style="display: none; margin-top: 24px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn" onclick="copyLink()" style="background: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);">Salin URL</button>
            </div>
        </div>
    </div>

    <!-- MODE VERIFIKASI -->
    <div class="form-container" id="verify-wrapper" style="display: none;">
        <div class="card" style="text-align: center; padding: 50px 30px;">
            <h2>Verifikasi Keamanan</h2>
            <p>Klik tombol di bawah untuk membuktikan Anda manusia.</p>
            <button class="btn" id="btn-robot" onclick="triggerVerify()" style="width: auto; padding: 14px 40px; margin: 0 auto;">
                <svg class="spinner" id="spinner-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btn-text">Saya Manusia</span>
            </button>
        </div>
    </div>

    <!-- MODE LIHAT KONTEN -->
    <div id="content-wrapper">
        <div class="content-box" id="view-mode"></div>
    </div>

    <script>
        /* =========================================
           PROTEKSI HALAMAN (Klik Kanan & Zoom)
           ========================================= */
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) { e.preventDefault(); } });


        /* =========================================
           SISTEM IKLAN BERGANTIAN (ROTASI MEMORI)
           ========================================= */
        const adLinks =[
            "https://conductivebreeds.com/rznx5d1wbr?key=dfe7ca4b20f77f2354da2aba17d12048",
            "https://omg10.com/4/10390860"
        ];

        function getNextAdUrl() {
            let currentIndex = parseInt(localStorage.getItem('ad_index')) || 0;
            let adUrl = adLinks[currentIndex];
            let nextIndex = (currentIndex + 1) % adLinks.length;
            localStorage.setItem('ad_index', nextIndex);
            return adUrl;
        }

        /* =========================================
           FUNGSI UTAMA
           ========================================= */
        let contentId = null;

        function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                contentId = id;
                const isVerified = localStorage.getItem('verified_' + contentId);
                if (isVerified === 'true') {
                    fetchAndLoadContent();
                } else {
                    document.getElementById('verify-wrapper').style.display = 'flex';
                }
            } else {
                document.getElementById('create-wrapper').style.display = 'flex';
            }
        }

        // --- TOMBOL VERIFIKASI (Tab-Under + Adblock Detect) ---
        function triggerVerify() {
            const btn = document.getElementById('btn-robot');
            const spinner = document.getElementById('spinner-icon');
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            document.getElementById('btn-text').innerText = "Loading...";

            localStorage.setItem('verified_' + contentId, 'true');

            let newWindow = null;
            try {
                // Gunakan noopener untuk security & batasi referrer
                newWindow = window.open(window.location.href, '_blank', 'noopener,noreferrer');
            } catch(e) {
                console.error("Window open error:", e);
            }

            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk melihat konten.");
                
                btn.disabled = false;
                spinner.style.display = 'none';
                document.getElementById('btn-text').innerText = "Saya Manusia";
                localStorage.removeItem('verified_' + contentId);
            } else {
                window.location.href = getNextAdUrl();
            }
        }

        // --- KLIK LINK KONTEN (Tab-Under + Adblock Detect) ---
        function openLinkSafe(event, el) {
            event.preventDefault(); 
            const url = el.href; 

            el.classList.add('link-merah');
            
            let newWindow = null;
            try {
                // Ditambahkan noopener,noreferrer
                newWindow = window.open(url, '_blank', 'noopener,noreferrer');
            } catch(e) {
                console.error("Window open error:", e);
            }
            
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk membuka link ini.");
            } else {
                newWindow.opener = null; 
                window.location.href = getNextAdUrl();
            }
        }

        // FUNGSI DISPLAY RANDOM NAMA FILE URL
        function randomizeDisplayUrl(url) {
            try {
                let parsed = new URL(url);
                let paths = parsed.pathname.split('/');
                let targetIndex = -1;
                for (let i = paths.length - 1; i >= 0; i--) {
                    if (paths[i].length > 0) {
                        targetIndex = i;
                        break;
                    }
                }
                if (targetIndex !== -1) {
                    let targetSegment = paths[targetIndex];
                    let dotIndex = targetSegment.lastIndexOf('.');
                    let baseName = targetSegment;
                    let extension = '';
                    if (dotIndex > 0) {
                        baseName = targetSegment.substring(0, dotIndex);
                        extension = targetSegment.substring(dotIndex);
                    }
                    let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let randomId = '';
                    for (let i = 0; i < baseName.length; i++) {
                        if (/[a-zA-Z0-9]/.test(baseName[i])) {
                            randomId += chars.charAt(Math.floor(Math.random() * chars.length));
                        } else {
                            randomId += baseName[i];
                        }
                    }
                    paths[targetIndex] = randomId + extension; 
                    parsed.pathname = paths.join('/');
                    return parsed.toString();
                }
            } catch(e) {
                return url; 
            }
            return url;
        }

        async function fetchAndLoadContent() {
            try {
                // HAPUS COMMENT DI BAWAH JIKA SUDAH DISAMBUNG KE SERVER
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error();
                const data = await res.json();

                localStorage.setItem('verified_' + contentId, 'true');

                setTimeout(() => {
                    document.getElementById('verify-wrapper').style.display = 'none';
                    document.getElementById('content-wrapper').style.display = 'block';
                    
                    document.getElementById('view-mode').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        let displayUrl = randomizeDisplayUrl(url);
                        // Ditambahkan rel="noopener noreferrer" pada tag <a>
                        return `<a href="${url}" class="link-asli" rel="noopener noreferrer" onclick="openLinkSafe(event, this)">${displayUrl}</a>`;
                    });
                }, 500);
            } catch (e) {
                alert("Data tidak ditemukan atau sudah kedaluwarsa.");
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Loading...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Gagal membuat link."); }
            btn.disabled = false;
            btn.innerText = "Submit";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Tersalin!";
            setTimeout(() => {
                btn.innerText = "Salin URL";
            }, 2000);
        }

        init();
    </script>
</body>
</html>
