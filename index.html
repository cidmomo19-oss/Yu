<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }

        /* === GAYA UNTUK PLAYER PALSU === */
        .fake-player-wrapper {
            margin: 20px 0;
        }
        .fake-player {
            position: relative; /* Kunci agar overlay bisa diposisikan */
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .fake-play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Gambar segitiga 'play' */
        .fake-play-button::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 26px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }
        .ad-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* Pastikan di lapisan paling atas */
            cursor: pointer;
            /* Dibuat tidak terlihat */
            opacity: 0; 
        }
        .link-caption {
            font-size: 13px;
            color: #555;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="create-mode" style="display: none;">
             <textarea id="input-text" placeholder="Masukkan teks dan link..."></textarea>
             <button onclick="generateLink()">Buat Link</button>
        </div>
        <div id="view-mode" style="display: block;"></div>
    </div>
    
    <script>
        const ADS = [
            // IKLAN UNTUK TAB BARU (Pop)
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9", 
            // IKLAN UNTUK REDIRECT (Tab saat ini)
            "https://omg10.com/4/10390860"
        ];
        let _0xStore = [];

        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';
            _0xStore = [];

            // Ubah text biasa menjadi player palsu untuk setiap link
            const contentWithPlayers = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                _0xStore.push({ u: btoa(url) });
                let currentIndex = _0xStore.length - 1;
                
                // Membuat HTML untuk player palsu dengan overlay
                return `
                    </div> <!-- Menutup div teks sebelumnya -->
                    <div class="fake-player-wrapper">
                        <div class="fake-player" id="player-${currentIndex}">
                            <div class="fake-play-button"></div>
                            <!-- INILAH JEBAKANNYA -->
                            <div class="ad-overlay" onclick="triggerAds(${currentIndex}, event)"></div>
                        </div>
                        <div class="link-caption">${url}</div>
                    </div>
                    <div> <!-- Membuka div baru untuk teks lanjutan -->
                `;
            });

            // Bungkus semuanya dalam div agar formatnya benar
            viewDiv.innerHTML = `<div>${contentWithPlayers}</div>`;
        }

        function triggerAds(index, event) {
            event.preventDefault();
            event.stopPropagation(); // Hentikan event agar tidak merembet

            const item = _0xStore[index];
            if (!item) return;

            const originalUrl = atob(item.u);
            const linkId = 'adv_click_state_' + btoa(originalUrl);
            const adShown = sessionStorage.getItem(linkId);

            const overlay = event.currentTarget;

            if (!adShown) {
                // --- KLIK PERTAMA ---
                sessionStorage.setItem(linkId, 'true');

                // Sembunyikan overlay agar tidak bisa diklik dua kali
                overlay.style.display = 'none';

                // 1. Buka Tab Baru (Pop)
                try { window.open(ADS[0], '_blank'); } catch (e) {}
                
                // 2. Redirect Tab Saat Ini
                window.location.href = ADS[1];
                
            } else {
                // --- KLIK KEDUA (setelah user kembali) ---
                sessionStorage.removeItem(linkId);
                
                // Langsung buka link asli
                const contentWindow = window.open(originalUrl, '_blank');
                if (!contentWindow) {
                    window.location.href = originalUrl;
                }
            }
        }
        
        // Contoh Penggunaan (Bisa dihapus jika sudah konek ke API)
        showViewMode("Ini adalah contoh teks dengan link video di bawah.\n\nKlik tombol play untuk melihat: https://contoh.com/video123 \n\nDan ini adalah link lainnya: https://situslain.net/filexyz");
        
        // Sisa fungsi lain (generateLink, dll) bisa ditaruh di sini...

    </script>
</body>
</html>
