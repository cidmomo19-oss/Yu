<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta No-Referrer untuk privasi total dari sisi web tujuan -->
    <meta name="referrer" content="no-referrer">
    <title>Chikuruya - Secure Link</title>
    
    <style>
        /* RESET DASAR & TEMA MODERN CERAH */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1f2937; 
            margin: 0; 
            background-color: #f8fafc; 
            min-height: 100vh;
            line-height: 1.7;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* HEADER ELEGAN */
        .header {
            background: #ffffff;
            padding: 18px 24px;
            font-size: 22px;
            font-weight: 800;
            color: #111827;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
            letter-spacing: -0.5px;
        }

        .header span { color: #3b82f6; }

        /* CONTAINER FORM BUAT LINK */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            padding: 40px 30px;
            width: 100%;
            max-width: 550px;
            border: 1px solid #f1f5f9;
        }

        .card h2 { margin: 0 0 8px 0; font-size: 24px; color: #111827; font-weight: 700; }
        .card p { color: #64748b; font-size: 15px; margin-bottom: 24px; }

        /* INPUT MODERN */
        textarea, input[type="text"] { 
            width: 100%; padding: 16px; font-size: 15px; border: 2px solid #e2e8f0; 
            border-radius: 12px; outline: none; margin-bottom: 20px; 
            font-family: inherit; background-color: #f8fafc; transition: all 0.3s ease;
        }
        
        textarea:focus, input[type="text"]:focus { 
            border-color: #3b82f6; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        textarea { resize: vertical; }

        /* BUTTON MODERN */
        button.btn { 
            background: #3b82f6; color: #ffffff; border: none; padding: 16px; 
            font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: 600; 
            width: 100%; transition: all 0.2s ease;
        }
        
        button.btn:hover { background: #2563eb; transform: translateY(-1px); }
        button.btn:active { transform: translateY(1px); }

        /* TAMPILAN ISI KONTEN (LANGSUNG BACKGROUND) */
        #content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
            display: none;
            text-align: left; 
            white-space: pre-wrap; 
            font-size: 16px;
            color: #1f2937;
        }

        /* STYLE LINK KONTEN */
        .link-asli {
            color: #2563eb; text-decoration: none; font-weight: 500;
            word-break: break-word; overflow-wrap: anywhere; cursor: pointer; 
            border-bottom: 1px solid transparent; transition: color 0.3s ease, border-color 0.3s ease;
        }
        
        .link-asli:hover { color: #1d4ed8; border-bottom: 1px solid #1d4ed8; }

        /* LINK BEKAS DIKLIK (MERAH) */
        .link-asli.link-merah { color: #ef4444 !important; }
        .link-asli.link-merah:hover { color: #b91c1c !important; border-bottom: 1px solid #b91c1c; }
    </style>
</head>
<body>

    <div class="header">
        Chikuruya<span>.</span>
    </div>

    <!-- MODE BUAT KONTEN -->
    <div class="form-container" id="create-wrapper" style="display: none;">
        <div class="card">
            <h2>Buat Link Baru</h2>
            <p>Masukkan teks atau daftar link video di bawah ini.</p>
            <textarea id="input-text" placeholder="1. https://l.pokoco.co/3k_eN1Fi5&#10;2. https://gofile.io/d/A1B2C3&#10;3. https://link.com/video.mp4" rows="8"></textarea>
            <button onclick="generateLink()" class="btn" id="btn-submit">Generate Link</button>
            
            <div id="result-box" style="display: none; margin-top: 24px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn" onclick="copyLink()" style="background-color: #10b981;">Salin URL</button>
            </div>
        </div>
    </div>

    <!-- MODE LIHAT KONTEN -->
    <div id="content-wrapper"></div>

    <script>
        /* =========================================
           PROTEKSI HALAMAN
           ========================================= */
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) { e.preventDefault(); } });

        /* =========================================
           SISTEM IKLAN & OPTIMASI SPEED (AMAN & LEGAL)
           ========================================= */
        const adLinks =[
            "https://conductivebreeds.com/rznx5d1wbr?key=dfe7ca4b20f77f2354da2aba17d12048",
            "https://omg10.com/4/10390860"
        ];

        // FUNGSI BARU: Memanaskan Jaringan Server Iklan di Balik Layar
        function preloadAdConnections() {
            try {
                // Ambil domain dasar dari list iklan agar tidak duplikat
                let domains = [...new Set(adLinks.map(url => new URL(url).origin))];
                
                domains.forEach(domain => {
                    // 1. DNS Prefetch (Mencari IP Server Lebih Awal)
                    let dns = document.createElement('link');
                    dns.rel = 'dns-prefetch';
                    dns.href = domain;
                    document.head.appendChild(dns);

                    // 2. Preconnect (Membuka gerbang TCP/TLS ke server Iklan Lebih Awal)
                    let preconnect = document.createElement('link');
                    preconnect.rel = 'preconnect';
                    preconnect.href = domain;
                    preconnect.crossOrigin = 'anonymous'; // Keamanan koneksi silang
                    document.head.appendChild(preconnect);
                });
            } catch(e) {}
        }

        function getNextAdUrl() {
            let currentIndex = parseInt(localStorage.getItem('ad_index')) || 0;
            let adUrl = adLinks[currentIndex];
            let nextIndex = (currentIndex + 1) % adLinks.length;
            localStorage.setItem('ad_index', nextIndex);
            return adUrl;
        }

        /* =========================================
           FUNGSI UTAMA
           ========================================= */
        let contentId = null;

        function init() {
            // Jalankan pre-koneksi iklan segera setelah web dibuka
            preloadAdConnections();

            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                contentId = id;
                fetchAndLoadContent();
            } else {
                document.getElementById('create-wrapper').style.display = 'flex';
            }
        }

        function openLinkSafe(event, el) {
            event.preventDefault(); 
            const url = el.href; 
            const linkId = el.getAttribute('data-linkid');

            el.classList.add('link-merah');
            
            if (linkId) {
                localStorage.setItem(linkId, 'true');
            }
            
            let newWindow = null;
            try {
                newWindow = window.open(url, '_blank');
            } catch(e) {
                console.error("Window open error:", e);
            }
            
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk membuka link ini.");
            } else {
                newWindow.opener = null;
                // Menggunakan sedikit delay UI Threading agar browser memprioritaskan pemindahan tab baru sebelum reload tab lama
                setTimeout(() => {
                    window.location.href = getNextAdUrl();
                }, 10);
            }
        }

        function randomizeDisplayUrl(url) {
            try {
                let parsed = new URL(url);
                let paths = parsed.pathname.split('/');
                let targetIndex = -1;
                for (let i = paths.length - 1; i >= 0; i--) {
                    if (paths[i].length > 0) {
                        targetIndex = i;
                        break;
                    }
                }
                if (targetIndex !== -1) {
                    let targetSegment = paths[targetIndex];
                    let dotIndex = targetSegment.lastIndexOf('.');
                    let baseName = targetSegment;
                    let extension = '';
                    if (dotIndex > 0) {
                        baseName = targetSegment.substring(0, dotIndex);
                        extension = targetSegment.substring(dotIndex);
                    }
                    let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let randomId = '';
                    for (let i = 0; i < baseName.length; i++) {
                        if (/[a-zA-Z0-9]/.test(baseName[i])) {
                            randomId += chars.charAt(Math.floor(Math.random() * chars.length));
                        } else {
                            randomId += baseName[i];
                        }
                    }
                    paths[targetIndex] = randomId + extension; 
                    parsed.pathname = paths.join('/');
                    return parsed.toString();
                }
            } catch(e) { return url; }
            return url;
        }

        async function fetchAndLoadContent() {
            try {
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error();
                const data = await res.json();

                document.getElementById('content-wrapper').style.display = 'block';
                
                document.getElementById('content-wrapper').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                    let displayUrl = randomizeDisplayUrl(url);
                    let linkId = 'clicked_' + encodeURIComponent(url);
                    let isClicked = localStorage.getItem(linkId) === 'true' ? 'link-merah' : '';

                    return `<a href="${url}" class="link-asli ${isClicked}" data-linkid="${linkId}" rel="noopener noreferrer" onclick="openLinkSafe(event, this)">${displayUrl}</a>`;
                });
            } catch (e) {
                document.getElementById('content-wrapper').style.display = 'block';
                document.getElementById('content-wrapper').innerHTML = '<span style="color:#ef4444; font-weight:bold;">Data tidak ditemukan atau sudah kedaluwarsa.</span>';
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Gagal membuat link."); }
            btn.disabled = false;
            btn.innerText = "Generate Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Berhasil Disalin!";
            setTimeout(() => btn.innerText = "Salin URL", 2000);
        }

        /* PENDETEKSI KETIKA USER KLIK TOMBOL "BACK" DARI IKLAN */
        window.addEventListener('pageshow', function(event) {
            const links = document.querySelectorAll('.link-asli');
            links.forEach(el => {
                const linkId = el.getAttribute('data-linkid');
                if (linkId && localStorage.getItem(linkId) === 'true') {
                    el.classList.add('link-merah');
                }
            });
        });

        init();
    </script>
</body>
</html>
