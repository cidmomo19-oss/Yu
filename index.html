<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        /* RESET & BASE CSS */
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
        }

        /* CARD STYLE MODERN */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            padding: 40px 30px;
            text-align: center;
            border: 1px solid #f1f5f9;
        }

        h2 { margin: 0 0 10px 0; font-size: 20px; font-weight: 600; }
        p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        /* FORM ELEMENTS */
        textarea, input { 
            width: 100%; box-sizing: border-box; padding: 14px; font-size: 14px; 
            border: 1px solid #cbd5e1; border-radius: 10px; outline: none; 
            margin-bottom: 15px; font-family: inherit; transition: all 0.2s; 
            background-color: #f8fafc;
        }
        textarea:focus, input:focus { 
            border-color: #3b82f6; 
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* PRIMARY BUTTON */
        button.btn-primary { 
            background-color: #0f172a; color: #ffffff; border: none; 
            padding: 14px 24px; font-size: 14px; border-radius: 10px; 
            cursor: pointer; font-weight: 600; width: 100%; 
            transition: all 0.2s; 
        }
        button.btn-primary:hover { background-color: #334155; transform: translateY(-1px); }
        button.btn-primary:active { transform: translateY(0); }
        button.btn-primary:disabled { opacity: 0.7; cursor: wait; }

        /* LINK STYLE */
        .link-blue { color: #2563eb; text-decoration: none; word-break: break-all; font-weight: 500; transition: color 0.2s; }
        .link-blue:hover { color: #1d4ed8; text-decoration: underline; }

        /* =========================================
           DESAIN HALAMAN VERIFIKASI (ROBOT GIMMICK)
           ========================================= */
        .icon-wrapper {
            width: 56px; height: 56px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
            color: #3b82f6;
        }

        /* TOMBOL KAPSUL GIMMICK */
        button.capsule-btn { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 50px; 
            padding: 12px 32px; 
            background-color: #ffffff; 
            color: #334155;
            font-size: 15px;
            font-weight: 500;
            border: 1.5px solid #cbd5e1;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        button.capsule-btn:hover { 
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }
        button.capsule-btn:active { background-color: #f1f5f9; }
        button.capsule-btn:disabled { opacity: 0.8; cursor: not-allowed; }

        .spinner {
            animation: spin 1s linear infinite;
            display: none; /* Sembunyi secara default */
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* VIEW KONTEN ASLI (Keluar dari desain Card) */
        #view-mode { 
            text-align: left; white-space: pre-wrap; font-size: 15px; 
            line-height: 1.7; background: #ffffff; padding: 40px; 
            border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <!-- WRAPPER UNTUK MEMBUAT LINK -->
    <div class="container" id="create-container" style="display: none;">
        <div class="card">
            <h2>Buat Link Aman</h2>
            <p class="subtitle">Konten akan disimpan ke server dan dilindungi layar verifikasi.</p>
            <textarea id="input-text" placeholder="Masukkan teks atau daftar link di sini..." rows="5"></textarea>
            <button onclick="generateLink()" class="btn-primary" id="btn-submit">Buat Link</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn-primary" onclick="copyLink()" style="background-color: #3b82f6;">Salin Link</button>
            </div>
        </div>
    </div>

    <!-- WRAPPER UNTUK HALAMAN VERIFIKASI (GIMMICK) -->
    <div class="container" id="verify-container" style="display: none;">
        <div class="card">
            <div class="icon-wrapper">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h2>Pengecekan Keamanan</h2>
            <p class="subtitle">Sistem perlu memastikan bahwa Anda adalah manusia sebelum melanjutkan ke halaman tujuan.</p>
            
            <!-- Tombol Kapsul "Saya bukan robot" -->
            <button class="capsule-btn" id="btn-robot" onclick="verifyAndLoad()">
                <!-- Icon Spinner (Loading) -->
                <svg class="spinner" id="spinner-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <!-- Icon Centang Default -->
                <svg id="check-icon" width="20" height="20" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                
                <span id="btn-text">Saya bukan robot</span>
            </button>
        </div>
    </div>

    <!-- WRAPPER UNTUK KONTEN ASLI (FULL LEBAR) -->
    <div style="width: 100%; max-width: 700px; display: none;" id="content-container">
        <div id="view-mode"></div>
    </div>

    <script>
        let contentId = null;

        // 1. INIT Pengecekan URL Mode
        function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            // Jika ada ID (sedang buka link hasil)
            if (id && id !== 'index.html') {
                contentId = id;
                document.getElementById('verify-container').style.display = 'block';
            } else {
                // Jika tidak ada ID (berada di Homepage)
                document.getElementById('create-container').style.display = 'block';
            }
        }

        // 2. KLIK TOMBOL ROBOT (FETCH KE BACKEND WORKER)
        async function verifyAndLoad() {
            const btn = document.getElementById('btn-robot');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner-icon');
            const checkIcon = document.getElementById('check-icon');

            // Ubah UI Tombol jadi Loading
            btn.disabled = true;
            checkIcon.style.display = 'none';
            spinner.style.display = 'block';
            btnText.innerText = "Memverifikasi...";

            try {
                // Tembak API Worker lu
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error("Data tidak ditemukan");
                
                const data = await res.json();
                if (!data.content) throw new Error("Konten kosong");

                // Beri delay 1 detik biar gimmick loading-nya kerasa
                setTimeout(() => {
                    document.getElementById('verify-container').style.display = 'none';
                    document.getElementById('content-container').style.display = 'block';
                    
                    // Render teks jadi link biru
                    document.body.style.alignItems = "flex-start"; // Ubah align ke atas
                    document.getElementById('view-mode').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        return `<a href="${url}" class="link-blue" target="_blank" rel="noopener noreferrer">${url}</a>`;
                    });
                }, 1000);

            } catch (e) {
                // Kalau ID expired / gak ada di KV Worker
                setTimeout(() => {
                    alert("Gagal memuat! Link mungkin sudah kedaluwarsa atau tidak valid.");
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    checkIcon.style.display = 'block';
                    btnText.innerText = "Saya bukan robot";
                }, 1000);
            }
        }

        // 3. FUNGSI BUAT LINK (POST KE BACKEND WORKER)
        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;

            const btn = document.getElementById('btn-submit');
            btn.disabled = true; 
            btn.innerText = "Menyimpan...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text }) 
                });
                
                const data = await res.json();
                
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { 
                alert("Terjadi kesalahan saat menghubungi server!"); 
            }
            
            btn.disabled = false; 
            btn.innerText = "Buat Link";
        }

        // 4. COPY HASIL
        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            
            const btnCopy = document.getElementById("btn-copy");
            btnCopy.innerText = "Tersalin!";
            btnCopy.style.backgroundColor = "#10b981"; 
            
            setTimeout(() => { 
                btnCopy.innerText = "Salin Link"; 
                btnCopy.style.backgroundColor = "#3b82f6";
            }, 2000);
        }

        // Jalankan
        init();
    </script>
</body>
</html>
