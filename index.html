<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #333333; }
        
        /* Link Polosan sesuai permintaan */
        .link-blue { 
            color: #0000ee; 
            text-decoration: none; /* Tanpa garis bawah */
            word-break: break-all; 
            cursor: pointer; 
            font-weight: 500;
            border: none; /* Tanpa garis titik-titik */
        }
        .link-blue:hover {
            color: #ff0000;
            text-decoration: none;
        }

        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" onclick="copyLink()">Salin Link</button>
            </div>
        </div>

        <!-- MODE VIEW -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        // DAFTAR IKLAN - Urut A, B, C...
        const ADS = [
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9",
            "https://omg10.com/4/10390860",
            "https://shope.ee/iklan-urut-3",
            "https://tokopedia.link/iklan-urut-4"
        ];

        let _0xVault = []; // Tempat simpan link asli (RAM)

        // 1. Fungsi Ambil Iklan Berurutan
        function getNextAd() {
            let ptr = parseInt(localStorage.getItem('_ad_pointer') || '0');
            let ad = ADS[ptr % ADS.length];
            localStorage.setItem('_ad_pointer', ptr + 1); // Simpan posisi urutan ke memory browser
            return ad;
        }

        // 2. SMART MASKING (Acak Path & Parameter)
        function universalMask(url) {
            try {
                let u = new URL(url);
                
                // Acak Kode di Path (misal: /u/KODE)
                let newPath = u.pathname.split('/').map(part => {
                    if (part.length > 5 && /[0-9]/.test(part)) {
                        let ext = part.includes('.') ? '.' + part.split('.').pop() : '';
                        return Math.random().toString(36).substring(2, 10) + ext;
                    }
                    return part;
                }).join('/');

                // Acak Kode di Parameter (misal: ?id=KODE atau ?v=KODE)
                let params = new URLSearchParams(u.search);
                params.forEach((value, key) => {
                    if (value.length > 4) { // Jika isi parameter lebih dari 4 karakter, acak!
                        params.set(key, Math.random().toString(36).substring(2, 11));
                    }
                });

                let searchStr = params.toString() ? '?' + params.toString() : '';
                return u.origin + newPath + searchStr;
            } catch (e) {
                return url;
            }
        }

        // 3. Render Teks
        function renderText(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';

            _0xVault = [];
            const processedText = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                _0xVault.push(btoa(url)); // Link asli aman di Base64 RAM
                let id = _0xVault.length - 1;
                let cleanDisplay = universalMask(url); // Tampilan polosan & kode acak
                return `<span class="link-blue" onclick="handleAdSystem(${id}, event)">${cleanDisplay}</span>`;
            });
            viewDiv.innerHTML = processedText;
        }

        // 4. LOGIKA IKLAN AGRESIF (Tab Baru + Ganti Tab Lama)
        function handleAdSystem(id, event) {
            event.preventDefault();
            const realLink = atob(_0xVault[id]);
            const clickToken = 'click_' + btoa(realLink).substring(0, 12);
            const step = sessionStorage.getItem(clickToken);

            if (!step) {
                // --- KLIK 1: Iklan di Tab Baru & Tab Lama ---
                sessionStorage.setItem(clickToken, 'step2');
                
                // Buka Iklan di tab baru
                const adWin = window.open(getNextAd(), '_blank');
                if (adWin) { adWin.blur(); window.focus(); }

                // Ganti tab lama (halaman ini) jadi iklan juga
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 150);
            } else {
                // --- KLIK 2: Link Asli di Tab Baru & Tab Lama Jadi Iklan ---
                sessionStorage.removeItem(clickToken);

                // Buka Link Asli
                let finalTarget = realLink;
                if (finalTarget.includes('pixeldrain.com/api/file/')) finalTarget = finalTarget.replace('/api/file/', '/u/');
                
                window.open(finalTarget, '_blank');

                // Ganti tab lama (halaman ini) jadi iklan penutup
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 150);
            }
        }

        // --- SISTEM PEMBUAT (Standard) ---
        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Error!"); }
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            document.getElementById("btn-copy").innerText = "Tersalin!";
            setTimeout(() => { document.getElementById("btn-copy").innerText = "Salin Link"; }, 2000);
        }

        async function init() {
            const path = window.location.pathname.split('/').filter(p => p).pop();
            if (path && path !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + path);
                    const data = await res.json();
                    renderText(data.content);
                } catch (e) { document.getElementById('create-mode').style.display = 'block'; }
            } else { document.getElementById('create-mode').style.display = 'block'; }
        }

        init();
    </script>
</body>
</html>
