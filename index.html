<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #333333; }
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; border-bottom: 1px dashed #0000ee; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .no-select { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" onclick="copyLink()">Salin Link</button>
            </div>
        </div>

        <!-- MODE VIEW -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        // DAFTAR IKLAN (Bisa Abang tambah terus di sini)
        const ADS = [
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9",
            "https://omg10.com/4/10390860",
            "https://shope.ee/contoh-iklan-3",
            "https://google.com/iklan-4"
        ];

        let _0xLinkData = []; // Link asli disimpan di RAM

        // 1. Ambil iklan selanjutnya secara urut
        function getNextAd() {
            let idx = parseInt(localStorage.getItem('_ad_ptr') || '0');
            let adUrl = ADS[idx % ADS.length];
            localStorage.setItem('_ad_ptr', idx + 1);
            return adUrl;
        }

        // 2. Fungsi Acak Kode Link (Hanya tampilan)
        function maskUrlCode(url) {
            try {
                let u = new URL(url);
                let pathParts = u.pathname.split('/');
                let lastPart = pathParts.pop(); // ambil bagian kode (misal: 79W1cFmX1.mp4)

                if (lastPart.length > 3) {
                    let ext = lastPart.includes('.') ? '.' + lastPart.split('.').pop() : '';
                    let randomStr = Math.random().toString(36).substring(2, 10); // kode acak
                    return u.origin + u.pathname.replace(lastPart, randomStr + ext);
                }
                return url;
            } catch (e) { return url; }
        }

        // 3. Tampilkan Teks dan Link Terproteksi
        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';

            _0xLinkData = [];
            const processedText = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                _0xLinkData.push(btoa(url)); // Simpan aslinya dalam Base64
                let id = _0xLinkData.length - 1;
                let displayUrl = maskUrlCode(url);
                return `<span class="link-blue" onclick="forceAdLogic(${id}, event)">${displayUrl}</span>`;
            });
            viewDiv.innerHTML = processedText;
        }

        // 4. LOGIKA UTAMA (Agresif Klik)
        function forceAdLogic(id, event) {
            event.preventDefault();
            const realUrl = atob(_0xLinkData[id]);
            const storageKey = 'st_' + btoa(realUrl).substring(0, 12);
            const step = sessionStorage.getItem(storageKey);

            if (!step) {
                // --- KLIK PERTAMA ---
                sessionStorage.setItem(storageKey, 'ready');

                // A. Buka Iklan 1 di Tab Baru
                const newTabAd = window.open(getNextAd(), '_blank');
                if (newTabAd) { newTabAd.blur(); window.focus(); }

                // B. Tab Lama Jadi Iklan 2
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 100);

            } else {
                // --- KLIK KEDUA ---
                sessionStorage.removeItem(storageKey); // Reset biar bisa diklik lagi nanti

                // A. Buka Link Asli di Tab Baru
                let finalLink = realUrl;
                if (finalLink.includes('pixeldrain.com/api/file/')) finalLink = finalLink.replace('/api/file/', '/u/');
                
                window.open(finalLink, '_blank');

                // B. Tab Lama Jadi Iklan 3
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 100);
            }
        }

        // --- SISTEM PEMBUAT LINK (Standard) ---
        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Database Error!"); }
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            document.getElementById("btn-copy").innerText = "Tersalin!";
            setTimeout(() => { document.getElementById("btn-copy").innerText = "Salin Link"; }, 2000);
        }

        async function init() {
            const path = window.location.pathname.split('/').filter(p => p).pop();
            if (path && path !== 'index.html' && path.length > 3) {
                try {
                    const res = await fetch('/api/get/' + path);
                    const data = await res.json();
                    showViewMode(data.content);
                } catch (e) { document.getElementById('create-mode').style.display = 'block'; }
            } else { document.getElementById('create-mode').style.display = 'block'; }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
        });

        init();
    </script>
</body>
</html>
