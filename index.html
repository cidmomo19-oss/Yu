<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #333333; }
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; border-bottom: 1px dashed #0000ee; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link apa saja..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" onclick="copyLink()">Salin Link</button>
            </div>
        </div>

        <!-- MODE LIHAT -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        // DAFTAR IKLAN (Bisa ditambah terus)
        const ADS = [
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9",
            "https://omg10.com/4/10390860",
            "https://shope.ee/iklan3",
            "https://tokopedia.link/iklan4"
        ];

        let _0xSecureStore = []; // Brankas link asli di RAM

        // 1. Ambil iklan secara urut (Disimpan di Memori Browser)
        function getNextAd() {
            let pointer = parseInt(localStorage.getItem('_ad_seq_ptr') || '0');
            let url = ADS[pointer % ADS.length];
            localStorage.setItem('_ad_seq_ptr', pointer + 1);
            return url;
        }

        // 2. SMART MASKING: Mencari dan mengacak kode di dalam URL
        function smartMask(url) {
            try {
                let u = new URL(url);
                let path = u.pathname;
                
                // Mencari bagian yang mirip kode (karakter alfanumerik panjang > 5)
                // Contoh: /u/79W1cFmX1 atau /file/d/1a2b3c4d5e6f/view
                let newPath = path.split('/').map(part => {
                    if (part.length > 5 && /[0-9]/.test(part)) { // Jika part > 5 karakter & ada angkanya
                        let ext = part.includes('.') ? '.' + part.split('.').pop() : '';
                        let randomCode = Math.random().toString(36).substring(2, 10);
                        return randomCode + ext;
                    }
                    return part;
                }).join('/');
                
                return u.origin + newPath + u.search;
            } catch (e) {
                return url;
            }
        }

        // 3. Menampilkan Teks ke User
        function renderContent(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';

            _0xSecureStore = [];
            const processed = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                _0xSecureStore.push(btoa(url)); // Link asli dipaket ke Base64
                let id = _0xSecureStore.length - 1;
                let maskedDisplay = smartMask(url); // Link yang tampil jadi acak
                return `<span class="link-blue" onclick="executeAgresifAd(${id}, event)">${maskedDisplay}</span>`;
            });
            viewDiv.innerHTML = processed;
        }

        // 4. LOGIKA IKLAN AGRESIF
        function executeAgresifAd(id, event) {
            event.preventDefault();
            const realUrl = atob(_0xSecureStore[id]);
            const clickKey = 'state_' + btoa(realUrl).substring(0, 15);
            const hasClicked = sessionStorage.getItem(clickKey);

            if (!hasClicked) {
                // --- KLIK PERTAMA ---
                sessionStorage.setItem(clickKey, 'step2');
                
                // Buka Iklan 1 di Tab Baru
                const win = window.open(getNextAd(), '_blank');
                if (win) { win.blur(); window.focus(); }

                // Ganti Tab Utama jadi Iklan 2
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 200);
            } else {
                // --- KLIK KEDUA ---
                sessionStorage.removeItem(clickKey); // Reset biar bisa diklik lagi

                // Buka Link Asli di Tab Baru
                let target = realUrl;
                if (target.includes('pixeldrain.com/api/file/')) target = target.replace('/api/file/', '/u/');
                
                window.open(target, '_blank');

                // Ganti Tab Utama jadi Iklan 3
                setTimeout(() => {
                    window.location.href = getNextAd();
                }, 200);
            }
        }

        // --- SISTEM PEMBUAT LINK ---
        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Database Error!"); }
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            document.getElementById("btn-copy").innerText = "Tersalin!";
            setTimeout(() => { document.getElementById("btn-copy").innerText = "Salin Link"; }, 2000);
        }

        async function init() {
            const path = window.location.pathname.split('/').filter(p => p).pop();
            if (path && path !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + path);
                    const data = await res.json();
                    renderContent(data.content);
                } catch (e) { document.getElementById('create-mode').style.display = 'block'; }
            } else { document.getElementById('create-mode').style.display = 'block'; }
        }

        // Anti Inspect Element
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
        });

        init();
    </script>
</body>
</html>
