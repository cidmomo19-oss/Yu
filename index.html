<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; }
        button { background: #000; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; }
        .link-blue { color: #0000ee; text-decoration: none; cursor: pointer; font-weight: 500; }
        #view-mode { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <!-- MODE BUAT PESAN -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" style="width:100%;height:200px" placeholder="Masukkan teks..."></textarea>
            <button onclick="generateLink()">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly>
            </div>
        </div>

        <!-- MODE BACA PESAN -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        const ADS = [
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9", // Iklan 1
            "https://omg10.com/4/10390860" // Iklan 2
        ];

        let _0xStore = [];

        // --- MANIPULASI JEMBATAN POLOS ---
        // Kita bikin halaman jembatan yang bener-bener polos
        const bridgeHTML = `
            <html>
            <body style="background:#fff;">
                <script>
                    // Redirect normal (bukan paksa)
                    setTimeout(() => {
                        window.location.href = "${ADS[1]}";
                    }, 100);
                <\/script>
            </body>
            </html>
        `;
        const bridgeBlob = new Blob([bridgeHTML], { type: 'text/html' });
        const bridgeUrl = URL.createObjectURL(bridgeBlob);

        // --- LOGIKA KLIK MANIPULASI ---
        
        function handleMouseDown(index) {
            const item = _0xStore[index];
            const originalUrl = atob(item.u);
            const linkId = 'state_' + btoa(originalUrl).substring(0, 15);

            if (localStorage.getItem(linkId) !== 'done') {
                // KLIK 1 (SAAT TEKAN): Buka Iklan 1
                window.open(ADS[0], '_blank');
            }
        }

        function handleMouseUp(index) {
            const item = _0xStore[index];
            const originalUrl = atob(item.u);
            const linkId = 'state_' + btoa(originalUrl).substring(0, 15);

            if (localStorage.getItem(linkId) === 'done') {
                // KLIK 2: Buka Link Asli (setelah dari iklan)
                localStorage.removeItem(linkId);
                window.open(originalUrl, '_blank');
            } else {
                // LANJUTAN KLIK 1 (SAAT LEPAS): Buka Jembatan Polos
                localStorage.setItem(linkId, 'done');
                window.open(bridgeUrl, '_blank');
            }
        }

        // --- FUNGSI STANDAR ---

        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';
            _0xStore = [];
            viewDiv.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                _0xStore.push({ u: btoa(url) });
                let idx = _0xStore.length - 1;
                // Pakai mousedown & mouseup buat misahin trigger biar gak keblokir Chrome
                return `<span class="link-blue" onmousedown="handleMouseDown(${idx})" onmouseup="handleMouseUp(${idx})">${url}</span>`;
            });
        }

        async function init() {
            const id = window.location.pathname.split('/').filter(p => p).pop();
            if (id && id !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + id);
                    const data = await res.json();
                    showViewMode(data.content);
                } catch (e) { document.getElementById('create-mode').style.display = 'block'; }
            } else { document.getElementById('create-mode').style.display = 'block'; }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const res = await fetch('/api/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text }) });
            const data = await res.json();
            document.getElementById('result-url').value = window.location.origin + '/' + data.id;
            document.getElementById('result-box').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
