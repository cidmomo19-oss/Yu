<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        /* RESET & BASE */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center; /* Konten tetap di tengah vertikal */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f8fafc;
            overflow: hidden; /* Mencegah scroll pada body utama */
        }

        /* LATAR BELAKANG ANIMASI */
        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 12s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #3b82f6; }
        .blob-2 { bottom: -15%; right: -10%; width: 55vw; height: 55vw; background: #8b5cf6; animation-delay: -2s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.1); }
        }

        /* CONTAINER UTAMA */
        .container { 
            width: 100%; 
            max-width: 500px; 
            position: relative;
            z-index: 10;
        }

        /* CARD STYLE (GLASSMORPHISM) */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 { margin: 0 0 10px 0; font-size: 22px; font-weight: 700; color: #0f172a; }
        p.subtitle { color: #64748b; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }

        /* INPUT & TEXTAREA */
        textarea, input { 
            width: 100%; box-sizing: border-box; padding: 16px; font-size: 15px; 
            border: 1px solid #e2e8f0; 
            border-radius: 14px; outline: none; 
            margin-bottom: 15px; font-family: inherit; transition: all 0.3s; 
            background: #ffffff;
        }
        textarea:focus, input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* BUTTONS */
        button.btn-primary { 
            background: #0f172a; color: #fff; border: none; 
            padding: 16px; font-size: 15px; border-radius: 14px; 
            cursor: pointer; font-weight: 600; width: 100%; 
            transition: 0.3s; 
        }
        button.btn-primary:hover { background: #3b82f6; transform: translateY(-2px); }

        /* LINK STYLE (FONT SAMA DENGAN TEKS) */
        .link-blue { 
            font-family: inherit; /* MEMASTIKAN FONT SAMA */
            color: #2563eb; 
            text-decoration: none; 
            font-weight: 600; 
            word-break: break-all;
            border-bottom: 1px solid rgba(37, 99, 235, 0.2);
            transition: all 0.2s;
        }
        .link-blue:hover { 
            color: #1d4ed8; 
            border-bottom-color: #1d4ed8;
            background: rgba(37, 99, 235, 0.05);
        }

        /* VERIFIKASI UI */
        .icon-wrapper {
            width: 60px; height: 60px; background: #eff6ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; color: #3b82f6;
        }

        button.capsule-btn { 
            display: inline-flex; align-items: center; gap: 10px;
            border-radius: 50px; padding: 12px 30px; 
            background: #fff; border: 1px solid #cbd5e1;
            cursor: pointer; font-weight: 600; font-family: inherit;
        }

        /* VIEW KONTEN (TETAP DI TENGAH) */
        #content-container { 
            width: 100%; 
            max-width: 700px; 
            display: none; 
            z-index: 10;
        }
        #view-mode { 
            text-align: left; 
            white-space: pre-wrap; 
            font-size: 16px; 
            line-height: 1.7;
            background: rgba(255, 255, 255, 0.9);
            padding: 35px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 80vh; /* Agar tidak melebihi layar */
            overflow-y: auto; /* Scroll dalam jika konten panjang */
        }
        
        /* Custom Scrollbar */
        #view-mode::-webkit-scrollbar { width: 6px; }
        #view-mode::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .spinner { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="bg-animated">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- CREATE MODE -->
    <div class="container" id="create-container" style="display: none;">
        <div class="card">
            <h2>Secure Link Generator</h2>
            <p class="subtitle">Amankan konten atau link Anda dengan verifikasi satu langkah.</p>
            <textarea id="input-text" placeholder="Masukkan teks atau link di sini..." rows="5"></textarea>
            <button onclick="generateLink()" class="btn-primary" id="btn-submit">Buat Link Aman</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn-primary" onclick="copyLink()">Salin Link</button>
            </div>
        </div>
    </div>

    <!-- VERIFY MODE -->
    <div class="container" id="verify-container" style="display: none;">
        <div class="card">
            <div class="icon-wrapper">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h2>Pengecekan Keamanan</h2>
            <p class="subtitle">Harap konfirmasi bahwa Anda adalah manusia.</p>
            <button class="capsule-btn" id="btn-robot" onclick="triggerVerify()">
                <svg class="spinner" id="spinner-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btn-text">Saya bukan robot</span>
            </button>
        </div>
    </div>

    <!-- VIEW MODE -->
    <div id="content-container">
        <div id="view-mode"></div>
    </div>

    <script>
        let contentId = null;

        function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                contentId = id;
                const isVerified = sessionStorage.getItem('verified_' + contentId);
                if (isVerified === 'true') {
                    fetchAndLoadContent();
                } else {
                    document.getElementById('verify-container').style.display = 'block';
                }
            } else {
                document.getElementById('create-container').style.display = 'block';
            }
        }

        function triggerVerify() {
            const btn = document.getElementById('btn-robot');
            const spinner = document.getElementById('spinner-icon');
            btn.disabled = true;
            spinner.style.display = 'block';
            document.getElementById('btn-text').innerText = "Memverifikasi...";
            fetchAndLoadContent();
        }

        async function fetchAndLoadContent() {
            try {
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error();
                const data = await res.json();

                sessionStorage.setItem('verified_' + contentId, 'true');

                setTimeout(() => {
                    document.getElementById('verify-container').style.display = 'none';
                    document.getElementById('content-container').style.display = 'block';
                    
                    // Render link dengan font yang SAMA dengan teks
                    document.getElementById('view-mode').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        return `<a href="${url}" class="link-blue" target="_blank" rel="noopener noreferrer">${url}</a>`;
                    });
                }, 1000);
            } catch (e) {
                alert("Data tidak ditemukan atau sudah kedaluwarsa.");
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Gagal membuat link."); }
            btn.disabled = false;
            btn.innerText = "Buat Link Aman";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Tersalin!";
            setTimeout(() => btn.innerText = "Salin Link", 2000);
        }

        init();
    </script>
</body>
</html>
