<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; transition: border-color 0.2s; }
        textarea:focus, input:focus { border-color: #007bff; }
        
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #333333; }
        
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; }
        .link-blue:hover { color: #ff0000; }

        /* Style Robot & Lanjutkan */
        .captcha-box, #continue-btn, #lanjutkan-btn { cursor: pointer; }
        
        /* Halaman Loading Progress Bar */
        #loading-mode .progress-bar { width: 80%; margin: 20px auto; height: 10px; background-color: #e9ecef; border-radius: 5px; overflow: hidden; }
        #loading-mode #progress-fill { width: 0%; height: 100%; background-color: #007bff; transition: width 2.5s ease-in-out; }

        #view-mode { text-align: left; white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        
        <!-- 1. MODE BUAT LINK -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <input type="text" id="input-password" placeholder="Password (Opsional)" autocomplete="off">
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" onclick="copyLink()">Salin Link</button>
            </div>
        </div>

        <!-- 2. HALAMAN ROBOT -->
        <div id="robot-mode" style="display: none;"> (Desain Robot dari kode sebelumnya) ... </div>

        <!-- 3. HALAMAN PASSWORD -->
        <div id="password-mode" style="display: none;"> (Desain Password dari kode sebelumnya) ... </div>
        
        <!-- 4. HALAMAN LOADING (BARU) -->
        <div id="loading-mode" style="display: none; padding-top: 50px;">
            <svg viewBox="0 0 24 24" width="70" height="70" stroke="#007bff" stroke-width="1.5" fill="none" ... > (Ikon loading) </svg>
            <h2 style="margin-top: 10px; font-weight: 600;">Menyiapkan Konten Anda</h2>
            <p style="color: #666;">Mohon tunggu sebentar...</p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <!-- 5. HALAMAN VIEW KONTEN -->
        <div id="view-mode" style="display: none;"></div>

        <!-- 6. HALAMAN LANJUTKAN (BARU) -->
        <div id="continue-to-link-mode" style="display: none; padding-top: 50px;">
             <svg viewBox="0 0 24 24" width="70" height="70" stroke="#28a745" stroke-width="1.5" fill="none" ...> (Ikon Link) </svg>
            <h2 style="margin-top: 10px; font-weight: 600;">Link Anda Siap</h2>
            <p style="color: #666; margin-bottom: 30px;">Klik untuk melanjutkan ke tujuan akhir.</p>
            <button id="lanjutkan-btn" onclick="openFinalLink()" style="width: auto; padding: 12px 40px; background-color: #28a745;">Lanjutkan</button>
        </div>
        
    </div>

    <script>
        // DAFTAR IKLAN
        const ADS =[
            "https://petsrulefondness.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9",
            "https://omg10.com/4/10390860"
        ];

        let _0xVault =[]; 
        let _pageData = null;

        function getNextAd() {
            let ptr = parseInt(localStorage.getItem('_ad_pointer') || '0');
            let ad = ADS[ptr % ADS.length];
            localStorage.setItem('_ad_pointer', ptr + 1);
            return ad;
        }

        // ==========================================
        // ALUR UTAMA & PROGRESI HALAMAN
        // ==========================================
        async function checkProgression() {
            const path = window.location.pathname.split('/').filter(p => p).pop();
            hideAllModes();

            // 1. Cek Robot
            if (!isStatePassed('robot_pass', path)) {
                document.getElementById('robot-mode').style.display = 'block';
                if (sessionStorage.getItem('robot_state_' + path) === 'spinning') {
                    // ... (logika spinner dari kode sebelumnya)
                }
                return;
            }

            // 2. Cek Password
            const hasPassword = _pageData && _pageData.password && _pageData.password.trim() !== "";
            if (hasPassword && localStorage.getItem('pwd_pass_' + path) !== _pageData.password) {
                document.getElementById('password-mode').style.display = 'block';
                return;
            }

            // 3. JEBAKAN HALAMAN LOADING (BARU)
            if (!sessionStorage.getItem('loading_shown_' + path)) {
                document.getElementById('loading-mode').style.display = 'block';
                // Animasi progress bar
                setTimeout(() => { document.getElementById('progress-fill').style.width = '100%'; }, 100);

                // Setelah loading, halaman ini jadi iklan & buka konten
                setTimeout(() => {
                    sessionStorage.setItem('loading_shown_' + path, 'true');
                    const contentTab = window.open(window.location.href, '_blank');
                    if (contentTab) { window.location.href = getNextAd(); } 
                    else { window.location.reload(); }
                }, 2800); // Tunggu 2.8 detik
                return;
            }
            
            // 4. Lolos Semua -> Tampilkan Konten
            renderText(_pageData.content);
        }

        // ==========================================
        // FUNGSI-FUNGSI JEBAKAN (Password, Robot, etc)
        // ... (Semua fungsi jebakan dari kode sebelumnya tetap sama)

        // Perubahan di 'submitPassword' dan 'continueToNextPhase'
        function submitPassword() {
            // ... (logika cek password benar/salah)
            if (passwordBenar) {
                localStorage.setItem('pwd_pass_' + path, _pageData.password);
                
                // Buka tab baru untuk memulai fase LOADING
                const nextStepTab = window.open(window.location.href, '_blank');
                if (nextStepTab) { window.location.href = getNextAd(); } 
                else { window.location.reload(); }
            }
        }

        // ==========================================
        // SISTEM KLIK LINK DI DALAM KONTEN
        // ==========================================
        function handleAdSystem(id, event) {
            event.preventDefault();
            const realLink = atob(_0xVault[id]);
            const clickToken = 'click_' + btoa(realLink).substring(0, 12);
            const step = sessionStorage.getItem(clickToken);

            if (!step) {
                // KLIK 1: Tetap sama, buka 2 iklan
                sessionStorage.setItem(clickToken, 'step2');
                const adWin = window.open(getNextAd(), '_blank');
                if (adWin) { adWin.blur(); window.focus(); }
                setTimeout(() => { window.location.href = getNextAd(); }, 150);
            } else {
                // KLIK 2: Buka Halaman Lanjutkan (Bukan link asli)
                sessionStorage.removeItem(clickToken);
                
                const encodedUrl = btoa(realLink);
                // Kita buat URL khusus untuk halaman Lanjutkan
                const continuePageUrl = `${window.location.origin}/lanjutkan#${encodedUrl}`;
                
                const nextStepTab = window.open(continuePageUrl, '_blank');
                if (nextStepTab) { window.location.href = getNextAd(); }
                else { window.location.href = continuePageUrl; }
            }
        }

        // ==========================================
        // LOGIKA HALAMAN LANJUTKAN (BARU)
        // ==========================================
        function initLanjutkanPage() {
            hideAllModes();
            document.getElementById('continue-to-link-mode').style.display = 'block';
        }

        function openFinalLink() {
            const encodedUrl = window.location.hash.substring(1);
            if (!encodedUrl) return;

            const realUrl = atob(encodedUrl);
            
            // Buka link asli di tab baru
            window.open(realUrl, '_blank');
            // Halaman lanjutkan ini jadi IKLAN TERAKHIR
            window.location.href = getNextAd();
        }


        // ==========================================
        // INISIALISASI & ROUTING UTAMA
        // ==========================================
        async function init() {
            const path = window.location.pathname;

            // Routing untuk halaman Lanjutkan
            if (path.startsWith('/lanjutkan')) {
                initLanjutkanPage();
                return;
            }

            // Routing untuk halaman utama
            const id = path.split('/').filter(p => p).pop();
            if (id && id !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + id);
                    _pageData = await res.json();
                    checkProgression();
                } catch (e) {
                    hideAllModes(); document.getElementById('create-mode').style.display = 'block';
                }
            } else {
                hideAllModes(); document.getElementById('create-mode').style.display = 'block';
            }
        }

        // ... (Kode generateLink, copyLink, dan fungsi-fungsi lainnya tetap sama)

        init();
    </script>
</body>
</html>
