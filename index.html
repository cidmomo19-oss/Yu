<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keamanan Konten</title>
    <style>
        /* Desain Modern & Minimalis */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #f9fafb; /* Abu-abu sangat terang */
            color: #111827; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
        }

        /* Wrapper untuk memusatkan mode Create & Verify */
        .center-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Desain Box Modern */
        .modern-box {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        /* Elemen Input & Tombol */
        textarea, input { 
            width: 100%; box-sizing: border-box; padding: 16px; font-size: 15px; 
            border: 1px solid #e5e7eb; border-radius: 12px; outline: none; 
            margin-bottom: 16px; font-family: inherit; transition: all 0.3s; 
            background-color: #f9fafb;
            resize: vertical;
        }
        textarea:focus, input:focus { 
            border-color: #111827; 
            background-color: #ffffff;
        }
        
        button.btn-black { 
            background-color: #111827; color: #ffffff; border: none; 
            padding: 16px; font-size: 15px; border-radius: 12px; 
            cursor: pointer; font-weight: 600; width: 100%; 
            transition: all 0.2s; 
        }
        button.btn-black:hover { background-color: #374151; transform: translateY(-1px); }

        /* =========================================
           TOMBOL VERIFIKASI (KAPSUL MODERN)
           ========================================= */
        #verify-mode h2 { margin: 0 0 8px 0; font-size: 20px; font-weight: 600; }
        #verify-mode p { font-size: 14px; color: #6b7280; margin-bottom: 30px; }

        .btn-capsule {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #ffffff;
            border: 2px solid #e5e7eb;
            color: #111827;
            padding: 14px 32px;
            border-radius: 999px; /* Membentuk kapsul sempurna */
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-capsule:hover {
            border-color: #111827;
        }

        /* Animasi Tombol saat diklik */
        .btn-capsule.loading {
            border-color: #3b82f6;
            color: #3b82f6;
            cursor: default;
            pointer-events: none;
        }
        .btn-capsule.success {
            border-color: #10b981;
            color: #10b981;
        }

        /* Animasi Spinner Muter */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Icon Checklist */
        .check-icon {
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
            background-color: #10b981; color: white;
            border-radius: 50%; font-size: 12px; font-weight: bold;
        }

        /* =========================================
           HALAMAN VIEW KONTEN (POLOSAN)
           ========================================= */
        #view-mode { 
            display: none;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: left; 
            white-space: pre-wrap; 
            font-size: 16px; 
            line-height: 1.6;
            color: #000000;
            background: transparent;
        }

        .link-blue { color: #2563eb; text-decoration: none; word-break: break-all; font-weight: 500; }
        .link-blue:hover { text-decoration: underline; color: #dc2626; }
        
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <!-- WRAPPER UNTUK TAMPILAN TENGAH -->
    <div id="center-ui" class="center-wrapper">
        
        <!-- 1. MODE BUAT LINK -->
        <div id="create-mode" class="modern-box" style="display: none;">
            <h2 style="margin: 0 0 10px 0; font-size: 20px;">Buat Link Memori</h2>
            <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Teks akan disimpan secara lokal di browser Anda.</p>
            
            <textarea id="input-text" placeholder="Masukkan teks atau link di sini..." rows="5"></textarea>
            <button onclick="generateLink()" class="btn-black" id="btn-submit">Simpan & Buat Link</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn-black" onclick="copyLink()" style="background-color: #2563eb;">Salin Link</button>
            </div>
        </div>

        <!-- 2. HALAMAN VERIFIKASI (GIMMICK ROBOT) -->
        <div id="verify-mode" class="modern-box" style="display: none;">
            <h2>Pengecekan Keamanan</h2>
            <p>Harap konfirmasi untuk melanjutkan.</p>
            
            <button id="btn-robot" class="btn-capsule" onclick="verifyRobot()">
                <!-- Icon kotak kecil bawaan sblm diklik -->
                <svg id="robot-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
                </svg>
                <span id="btn-text">Saya bukan robot</span>
            </button>
        </div>

    </div>

    <!-- 3. HALAMAN VIEW KONTEN (TAMPIL POLOS TANPA KOTAK) -->
    <div id="view-mode"></div>

    <script>
        let _decodedContent = "";

        // ==========================================
        // INIT: Cek Hash URL & Load dari LocalStorage
        // ==========================================
        function init() {
            const id = window.location.hash.substring(1); 
            
            if (id) {
                const savedData = localStorage.getItem('secure_link_' + id);

                if (savedData) {
                    _decodedContent = savedData;
                    
                    document.getElementById('create-mode').style.display = 'none';
                    document.getElementById('verify-mode').style.display = 'block';
                } else {
                    alert("Konten tidak ditemukan di memori browser ini!");
                    window.location.hash = ''; 
                    document.getElementById('create-mode').style.display = 'block';
                }
            } else {
                document.getElementById('create-mode').style.display = 'block';
            }
        }

        // ==========================================
        // KLIK "SAYA BUKAN ROBOT" (Animasi Gimmick)
        // ==========================================
        function verifyRobot() {
            const btn = document.getElementById('btn-robot');
            
            // 1. Ubah jadi mode loading / muter
            btn.classList.add('loading');
            btn.innerHTML = `<div class="spinner"></div> <span>Memverifikasi...</span>`;

            // 2. Simulasi loading selama 1.5 detik
            setTimeout(() => {
                // Ubah jadi sukses (Warna Hijau)
                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.innerHTML = `<div class="check-icon">✓</div> <span>Berhasil</span>`;

                // 3. Jeda sedikit lalu buka konten asli
                setTimeout(() => {
                    // Hilangkan semua UI di tengah
                    document.getElementById('center-ui').style.display = 'none';
                    // Ubah background body jadi bener-bener putih biar tulisan polosan makin bersih
                    document.body.style.backgroundColor = "#ffffff";
                    // Tampilkan teks
                    renderText(_decodedContent);
                }, 600);

            }, 1500);
        }

        // ==========================================
        // RENDER KONTEN
        // ==========================================
        function renderText(text) {
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block'; 
            
            viewDiv.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, url => {
                return `<a href="${url}" class="link-blue" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        // ==========================================
        // BUAT LINK (Save ke LocalStorage)
        // ==========================================
        function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            
            // Bikin ID acak singkat
            const randomId = Math.random().toString(36).substring(2, 8);
            localStorage.setItem('secure_link_' + randomId, text);
            
            const baseUrl = window.location.href.split('#')[0];
            const finalUrl = baseUrl + '#' + randomId;

            document.getElementById('result-url').value = finalUrl;
            document.getElementById('result-box').style.display = 'block';
        }

        // ==========================================
        // COPY LINK
        // ==========================================
        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            const btnCopy = document.getElementById("btn-copy");
            btnCopy.innerText = "Tersalin!";
            btnCopy.style.backgroundColor = "#10b981"; 
            setTimeout(() => { 
                btnCopy.innerText = "Salin Link"; 
                btnCopy.style.backgroundColor = "#2563eb";
            }, 2000);
        }

        init();
    </script>
</body>
</html>
