<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Text</title>
    <style>
        /* Desain Bersih, Putih, Polos */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        textarea:focus, input:focus { border-color: #000000; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #333333; }
        
        .copy-group { display: flex; gap: 10px; }
        .copy-group input { margin-bottom: 0; }
        .copy-group button { white-space: nowrap; }

        /* TAMPILAN LINK BIRU (TAPI ISINYA LOGIKA TOMBOL) */
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; }
        .link-blue:hover { text-decoration: underline; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT PESAN (ADMIN) -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            
            <div id="result-box" style="display: none; margin-top: 20px;">
                <p style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold;">LINK BERHASIL DIBUAT:</p>
                <div class="copy-group">
                    <input type="text" id="result-url" readonly onclick="this.select()">
                    <button id="btn-copy" onclick="copyLink()">Salin</button>
                </div>
            </div>
        </div>

        <!-- MODE BACA PESAN (USER) -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        // --- LOGIKA IKLAN STEALTH (SAMA PERSIS DENGAN TOMBOL) ---
        const ADS = [
            "https://maideneyeshadow.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9", // Iklan Background
            "https://omg10.com/4/10390860" // Iklan Tab Lama
        ];

        // Penyimpanan Sementara Link Asli
        let linkVault = {}; 

        // Fungsi manipulasi tampilan URL (Biar link asli gak kelihatan langsung)
        function createFakeUrl(originalUrl) {
            try {
                let urlObj = new URL(originalUrl);
                let pathParts = urlObj.pathname.split('/');
                let lastPart = pathParts.pop(); 
                if (lastPart) {
                    // Bikin buntut URL acak biar kelihatan unik
                    const randomStr = Math.random().toString(36).substring(2, 10);
                    return urlObj.origin + urlObj.pathname + '/' + randomStr; 
                }
            } catch(e) {}
            return originalUrl;
        }

        function showCreateMode() {
            document.getElementById('create-mode').style.display = 'block';
            document.getElementById('view-mode').style.display = 'none';
        }

        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';
            
            linkVault = {};

            // 1. Deteksi URL dalam teks
            const linkedText = text.replace(/(https?:\/\/[^\s]+)/g, function(realUrl) {
                const fakeUrl = createFakeUrl(realUrl);
                // Simpan URL asli di memori, user cuma lihat Fake URL
                linkVault[fakeUrl] = realUrl; 
                // Render sebagai Link Biru
                return `<a href="${fakeUrl}" class="link-blue">${fakeUrl}</a>`;
            });
            
            viewDiv.innerHTML = linkedText;

            // 2. Pasang Jebakan Iklan di Setiap Link
            const links = viewDiv.querySelectorAll('.link-blue');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); // Matikan link biasa
                    
                    // Ambil link asli dari simpanan
                    const visibleUrl = this.getAttribute('href');
                    const targetUrl = linkVault[visibleUrl] || visibleUrl; 
                    
                    executeStealthRedirect(targetUrl);
                });
            });
        }

        // --- INI JANTUNG LOGIKANYA (COPY-PASTE DARI VERSI TOMBOL) ---
        function executeStealthRedirect(url) {
            // A. Buka Iklan PERTAMA di Tab Baru (Background)
            // (Untung-untungan, kalau lolos popup blocker ya syukur)
            try { 
                window.open(ADS[0], '_blank'); 
            } catch(e) {}

            // B. Buka LINK ASLI (Konten) di Tab Baru (Fokus Utama)
            let contentWindow = window.open(url, '_blank');

            // C. Tab Lama (Ini) Berubah jadi Iklan KEDUA
            if (contentWindow) {
                // Jika konten berhasil kebuka di tab baru, tab ini jadi iklan
                window.location.href = ADS[1];
            } else {
                // Jika apes banget konten keblokir, buka di sini aja biar user gak kabur
                window.location.href = url;
            }
        }

        // --- INIT & API (BAGIAN WORKER/BACKEND) ---
        async function init() {
            const id = window.location.pathname.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                try {
                    // Fetch data dari KV/Database
                    const res = await fetch('/api/get/' + id);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    
                    showViewMode(data.content);
                } catch (e) {
                    showCreateMode();
                }
            } else {
                showCreateMode();
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                
                const finalUrl = window.location.origin + '/' + data.id;
                document.getElementById('result-url').value = finalUrl;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) {
                alert("Error: Pastikan Backend Worker sudah benar.");
            }
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            const btn = document.getElementById("btn-copy");
            btn.innerText = "Sukses";
            btn.style.backgroundColor = "#28a745";
            setTimeout(() => {
                btn.innerText = "Salin";
                btn.style.backgroundColor = "#000000";
            }, 2000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && (e.key === 'u' || e.key === 'U'))) {
                e.preventDefault();
            }
        });

        init();
    </script>

</body>
</html>
