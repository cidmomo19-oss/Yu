<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text</title>
    <style>
        /* Desain Bersih, Putih, Polos */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; }
        textarea { height: 300px; resize: none; }
        textarea:focus, input:focus { border-color: #000000; }
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #333333; }
        
        /* Link Biru Bersih */
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; }
        .link-blue:hover { text-decoration: underline; }
        #view-mode { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        
        /* Anti Seleksi Teks Biar Makin Susah Dicolong */
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        <!-- MODE BUAT PESAN -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli..."></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
            </div>
        </div>

        <!-- MODE BACA PESAN -->
        <div id="view-mode" style="display: none;"></div>
    </div>

    <script>
        // --- 2 LINK IKLAN ROTASI ---
        const ADS =[
            "https://maideneyeshadow.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9",
            "https://omg10.com/4/10390860"
        ];

        // VARIABEL RAHASIA UNTUK NYIMPEN LINK ASLI (Tidak akan masuk ke HTML)
        let linkVault = {}; 

        function getNextAd() {
            let idx = parseInt(localStorage.getItem('ad_idx') || '0');
            let nextAd = ADS[idx];
            localStorage.setItem('ad_idx', (idx + 1) % ADS.length);
            return nextAd;
        }

        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
            return result;
        }

        function createFakeUrl(originalUrl) {
            try {
                let urlObj = new URL(originalUrl);
                let pathParts = urlObj.pathname.split('/');
                let lastPart = pathParts.pop(); 
                if (lastPart && lastPart.length > 1) {
                    let fileParts = lastPart.split('.');
                    let baseId = fileParts[0];
                    let ext = fileParts.length > 1 ? '.' + fileParts.slice(1).join('.') : '';
                    let fakeId = generateRandomString(baseId.length > 3 ? baseId.length : 8);
                    pathParts.push(fakeId + ext);
                    urlObj.pathname = pathParts.join('/');
                    return urlObj.toString();
                }
            } catch(e) {}
            return originalUrl; // Fallback jika format aneh
        }

        function showCreateMode() {
            document.getElementById('create-mode').style.display = 'block';
            document.getElementById('view-mode').style.display = 'none';
        }

        function showViewMode(text) {
            document.getElementById('create-mode').style.display = 'none';
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block';
            
            // Bersihkan vault setiap kali render
            linkVault = {};

            // Render Teks & Simpan Link Asli MURNI DI JAVASCRIPT
            const linkedText = text.replace(/(https?:\/\/[^\s]+)/g, function(realUrl) {
                const fakeUrl = createFakeUrl(realUrl);
                
                // SIMPAN KE MEMORI JAVASCRIPT (Kunci: fakeUrl, Nilai: realUrl)
                linkVault[fakeUrl] = realUrl; 

                // HANYA RENDER FAKE URL KE HTML! Gak ada atribut data-real lagi.
                return `<a href="${fakeUrl}" class="link-blue">${fakeUrl}</a>`;
            });
            
            viewDiv.innerHTML = linkedText;

            // EVENT KLIK "MAJU TERUS 3X" (Narik link asli dari memori JS)
            const links = viewDiv.querySelectorAll('.link-blue');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    
                    const clickedFakeUrl = this.getAttribute('href');
                    
                    // AMBIL LINK ASLI DARI MEMORI BERDASARKAN LINK PALSU YANG DIKLIK
                    const targetUrl = linkVault[clickedFakeUrl]; 
                    
                    // Kalau entah kenapa gak ada di memori, pake link palsunya aja (biar dia error)
                    const finalDest = targetUrl ? targetUrl : clickedFakeUrl; 
                    
                    let clickCount = parseInt(localStorage.getItem('link_clicks') || '0');
                    let newTabUrl;
                    
                    if (clickCount < 2) {
                        // KLIK 1 & 2: Buka halaman duplikat
                        newTabUrl = window.location.href;
                        localStorage.setItem('link_clicks', clickCount + 1);
                    } else {
                        // KLIK 3: Buka KONTEN ASLI secara rahasia
                        newTabUrl = finalDest;
                        localStorage.setItem('link_clicks', '0'); 
                    }
                    
                    const newTab = window.open(newTabUrl, '_blank');
                    if (newTab) { window.location.href = getNextAd(); } 
                    else { window.location.href = getNextAd(); }
                });
            });
        }

        async function init() {
            const id = window.location.pathname.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                try {
                    const res = await fetch('/api/get/' + id);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    
                    if(!sessionStorage.getItem('visited')) {
                        localStorage.setItem('link_clicks', '0');
                        sessionStorage.setItem('visited', 'true');
                    }
                    
                    showViewMode(data.content);
                } catch (e) {
                    showCreateMode();
                }
            } else {
                showCreateMode();
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Loading...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                
                const finalUrl = window.location.origin + '/' + data.id;
                document.getElementById('result-url').value = finalUrl;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) {
                alert("Gagal konek ke KV!");
            }
            btn.disabled = false; btn.innerText = "Buat";
        }

        // Tambahan keamanan: Cegah pencuri neken F12 atau Ctrl+U
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S'))) {
                e.preventDefault();
            }
        });

        init();
    </script>

</body>
</html>
