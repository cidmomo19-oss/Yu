<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border: 1px solid #cccccc; border-radius: 4px; outline: none; margin-bottom: 15px; font-family: inherit; transition: border-color 0.2s; }
        textarea:focus, input:focus { border-color: #007bff; }
        
        button { background-color: #000000; color: #ffffff; border: none; padding: 12px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #333333; }
        
        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; }
        .link-blue:hover { color: #ff0000; }

        #view-mode { text-align: left; white-space: pre-wrap; font-size: 15px; line-height: 1.6; padding: 20px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); background: #fafafa;}
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false">

    <div class="container">
        
        <!-- 1. MODE BUAT LINK (Tanpa input password) -->
        <div id="create-mode" style="display: none;">
            <textarea id="input-text" placeholder="Masukkan teks dan link asli di sini..." rows="8"></textarea>
            <button onclick="generateLink()" id="btn-submit">Buat Link</button>
            <div id="result-box" style="display: none; margin-top: 20px;">
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" onclick="copyLink()">Salin Link</button>
            </div>
        </div>
        
        <!-- 2. HALAMAN VIEW KONTEN (Langsung muncul saat link dibuka) -->
        <div id="view-mode" style="display: none;"></div>

    </div>

    <script>
        // PENGATURAN IKLAN
        const adUrl = "https://omg10.com/4/10390860";
        
        let _0xVault = []; 
        let _pageData = null;
        
        // Variabel untuk menghitung jumlah klik (Logika Ganjil-Genap)
        let clickCount = 0; 

        // ==========================================
        // FUNGSI INTERAKSI KLIK LINK
        // ==========================================
        function handleLinkClick(id, event) {
            event.preventDefault(); // Mencegah link langsung terbuka

            clickCount++; // Tambah jumlah klik setiap kali link ditekan

            // Logika Ganjil Genap (Modulo)
            if (clickCount % 2 !== 0) {
                // JIKA KLIK GANJIL (1, 3, 5, dst) -> BUKA IKLAN DI TAB BARU
                window.open(adUrl, '_blank', 'noopener,noreferrer');
            } else {
                // JIKA KLIK GENAP (2, 4, 6, dst) -> BUKA LINK ASLI DI TAB BARU
                const realLink = atob(_0xVault[id]);
                window.open(realLink, '_blank', 'noopener,noreferrer');
            }
        }

        // ==========================================
        // MASKING URL & RENDER TEKS
        // ==========================================
        function universalMask(url) {
            try {
                let u = new URL(url);
                let newPath = u.pathname.split('/').map(part => (part.length > 5 && /[0-9]/.test(part)) ? (Math.random().toString(36).substring(2, 10) + (part.includes('.') ? '.' + part.split('.').pop() : '')) : part).join('/');
                let params = new URLSearchParams(u.search);
                params.forEach((v, k) => { if (v.length > 4) params.set(k, Math.random().toString(36).substring(2, 11)); });
                return u.origin + newPath + (params.toString() ? '?' + params.toString() : '');
            } catch (e) { return url; }
        }

        function renderText(text) {
            const viewDiv = document.getElementById('view-mode');
            viewDiv.style.display = 'block'; 
            _0xVault = [];
            
            // Ubah semua URL menjadi span yang bisa diklik
            viewDiv.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, url => {
                _0xVault.push(btoa(url));
                // Panggil fungsi handleLinkClick saat diklik
                return `<span class="link-blue" onclick="handleLinkClick(${_0xVault.length - 1}, event)">${universalMask(url)}</span>`;
            });
        }

        // ==========================================
        // INISIALISASI & AMBIL DATA (BISA BACA LINK LAMA)
        // ==========================================
        async function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                try {
                    // Ambil data dari backend (Cloudflare Worker)
                    const res = await fetch('/api/get/' + id);
                    if (!res.ok) throw new Error("Not found");
                    
                    _pageData = await res.json();
                    
                    if(!_pageData.content) throw new Error("Content empty");
                    
                    // LANGSUNG TAMPILKAN KONTEN (Abaikan password meskipun link lama punya password)
                    document.getElementById('create-mode').style.display = 'none';
                    renderText(_pageData.content);

                } catch (e) {
                    // Jika error / ID tidak ditemukan, kembalikan ke halaman buat link
                    document.getElementById('create-mode').style.display = 'block';
                }
            } else {
                // Jika URL root (/), tampilkan halaman buat link
                document.getElementById('create-mode').style.display = 'block';
            }
        }

        // ==========================================
        // FUNGSI BUAT LINK BARU
        // ==========================================
        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing...";
            
            try {
                // Hanya mengirim content, tanpa password
                const res = await fetch('/api/create', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text }) 
                });
                const data = await res.json();
                
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { 
                alert("Gagal membuat link. Periksa koneksi."); 
            }
            
            btn.disabled = false; btn.innerText = "Buat Link";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select(); document.execCommand("copy");
            document.getElementById("btn-copy").innerText = "Tersalin!";
            setTimeout(() => { document.getElementById("btn-copy").innerText = "Salin Link"; }, 2000);
        }

        // Jalankan saat web dibuka
        init();
    </script>
</body>
</html>
