<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Mematikan zoom di perangkat Mobile (HP) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- SISTEM NO-REFERRER GLOBAL -->
    <meta name="referrer" content="no-referrer">
    
    <title>Secure Content Viewer</title>
    
    <style>
        /* RESET DASAR & TEMA MINIMALIS */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #0f172a; 
            margin: 0; 
            /* Background bersih tanpa kotak */
            background: #ffffff; 
            min-height: 100vh;
            line-height: 1.7;
            touch-action: manipulation;
            
            /* MEMPERKUAT ANTI COPY & SELEKSI */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Izinkan seleksi hanya pada input form */
        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* HEADER CLEAN BATA KIRI */
        .header {
            padding: 50px 8% 20px 8%;
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -1px;
        }

        /* WRAPPER KONTEN (Rata Kiri, Tanpa Flex Center) */
        .form-container, #content-wrapper {
            display: block;
            padding: 0 8% 60px 8%;
            max-width: 800px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* MENGHILANGKAN KOTAK KARTU */
        .card, .content-box {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            width: 100%;
        }

        h2 { 
            margin: 0 0 12px 0; 
            font-size: 32px; 
            font-weight: 800;
            color: #0f172a; 
            letter-spacing: -1px;
        }
        
        p { 
            color: #475569; 
            font-size: 16px; 
            margin-bottom: 30px; 
            line-height: 1.6;
            max-width: 600px;
        }

        /* INPUT & TEXTAREA MINIMALIS */
        textarea, input { 
            width: 100%; 
            padding: 18px 20px; 
            font-size: 15px; 
            background: #f8fafc; /* Abu-abu sangat pucat */
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            outline: none; 
            margin-bottom: 20px; 
            font-family: inherit;
            box-sizing: border-box;
            color: #1e293b;
            transition: all 0.3s ease;
        }
        
        textarea::placeholder, input::placeholder {
            color: #94a3b8;
        }

        textarea:focus, input:focus { 
            background: #ffffff;
            border-color: #3b82f6; 
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08);
        }

        textarea { resize: vertical; min-height: 160px; }

        /* BUTTON ELEGANT BATA KIRI */
        button.btn { 
            background: #0f172a; /* Hitam elegan */
            color: #ffffff; 
            border: none; 
            padding: 16px 32px; 
            font-size: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            max-width: max-content;
        }
        
        button.btn:hover { 
            background: #3b82f6; /* Berubah biru saat di-hover */
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }

        button.btn:active {
            transform: translateY(0);
        }

        button.btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #result-box {
            padding-top: 30px;
            margin-top: 20px;
            border-top: 1px solid #f1f5f9;
        }

        /* CUSTOM LINK STYLE (Tanpa Referrer) */
        .content-box {
            white-space: pre-wrap; 
            font-size: 17px;
            color: #1e293b;
            line-height: 1.9;
        }

        .link-asli {
            color: #2563eb; 
            text-decoration: none; 
            font-weight: 500;
            border-bottom: 2px solid rgba(37, 99, 235, 0.2);
            padding-bottom: 1px;
            word-break: break-word; 
            overflow-wrap: anywhere; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        
        .link-asli:hover {
            color: #1d4ed8;
            border-bottom-color: #1d4ed8;
            background: rgba(37, 99, 235, 0.05);
        }

        .link-asli.link-merah {
            color: #ef4444 !important; 
            border-bottom-color: #fca5a5 !important;
        }
        .link-asli.link-merah:hover {
            color: #dc2626 !important; 
            border-bottom-color: #dc2626 !important;
            background: rgba(239, 68, 68, 0.05);
        }

        /* ANIMASI SPINNER & MUNCUL */
        .spinner { 
            animation: spin 1s linear infinite; 
            display: none; 
            margin-right: 12px; 
            vertical-align: middle; 
        }
        
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* RESPONSIVE UNTUK HP */
        @media (max-width: 600px) {
            .header { padding: 40px 6% 10px 6%; }
            .form-container, #content-wrapper { padding: 10px 6% 40px 6%; }
            h2 { font-size: 26px; }
            button.btn { width: 100%; max-width: none; } /* Di HP tombol jadi full biar mudah diklik */
        }
    </style>
</head>
<body>

    <div class="header">
        Chikuruya.
    </div>

    <!-- MODE BUAT KONTEN -->
    <div class="form-container" id="create-wrapper" style="display: none;">
        <div class="card">
            <h2>Buat Link Baru</h2>
            <p>Masukkan teks atau list link video di bawah ini. Tautan akan dienkripsi dan diamankan.</p>
            <textarea id="input-text" placeholder="1. https://l.pokoco.co/3k_eN1Fi5&#10;2. https://gofile.io/d/A1B2C3&#10;3. https://link.com/video.mp4" rows="8"></textarea>
            <button onclick="generateLink()" class="btn" id="btn-submit">Submit Tautan</button>
            
            <div id="result-box" style="display: none;">
                <p style="margin-bottom: 12px; font-weight: 500; color: #0f172a;">Link berhasil dibuat:</p>
                <input type="text" id="result-url" readonly onclick="this.select()">
                <button id="btn-copy" class="btn" onclick="copyLink()">Salin URL</button>
            </div>
        </div>
    </div>

    <!-- MODE VERIFIKASI -->
    <div class="form-container" id="verify-wrapper" style="display: none;">
        <div class="card">
            <h2>Verifikasi Keamanan</h2>
            <p>Sistem kami mendeteksi tautan terlindungi. Klik tombol di bawah untuk membuktikan bahwa Anda bukan robot pemindai otomatis.</p>
            <button class="btn" id="btn-robot" onclick="triggerVerify()">
                <svg class="spinner" id="spinner-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btn-text">Saya Manusia, Lanjutkan</span>
            </button>
        </div>
    </div>

    <!-- MODE LIHAT KONTEN -->
    <div id="content-wrapper">
        <div class="content-box" id="view-mode"></div>
    </div>

    <script>
        /* =========================================
           PROTEKSI HALAMAN (Klik Kanan, Blokir Copy & Zoom)
           ========================================= */
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); }); // Anti seret gambar/teks
        document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('keydown', function(e) { 
            // Matikan CTRL+S, CTRL+U, CTRL+P, dll
            if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0' || e.key === 'u' || e.key === 's' || e.key === 'p' || e.key === 'c')) { 
                e.preventDefault(); 
            } 
        });


        /* =========================================
           SISTEM IKLAN BERGANTIAN (ROTASI MEMORI)
           ========================================= */
        const adLinks =[
            "https://conductivebreeds.com/rznx5d1wbr?key=dfe7ca4b20f77f2354da2aba17d12048",
            "https://omg10.com/4/10390860"
        ];

        function getNextAdUrl() {
            let currentIndex = parseInt(localStorage.getItem('ad_index')) || 0;
            let adUrl = adLinks[currentIndex];
            let nextIndex = (currentIndex + 1) % adLinks.length;
            localStorage.setItem('ad_index', nextIndex);
            return adUrl;
        }

        /* =========================================
           FUNGSI UTAMA
           ========================================= */
        let contentId = null;

        function init() {
            const path = window.location.pathname;
            const id = path.split('/').filter(p => p).pop();
            
            if (id && id !== 'index.html') {
                contentId = id;
                const isVerified = localStorage.getItem('verified_' + contentId);
                if (isVerified === 'true') {
                    fetchAndLoadContent();
                } else {
                    document.getElementById('verify-wrapper').style.display = 'block';
                }
            } else {
                document.getElementById('create-wrapper').style.display = 'block';
            }
        }

        function triggerVerify() {
            const btn = document.getElementById('btn-robot');
            const spinner = document.getElementById('spinner-icon');
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            document.getElementById('btn-text').innerText = "Memproses...";

            localStorage.setItem('verified_' + contentId, 'true');

            let newWindow = null;
            try {
                // Rel noopener ditambahkan saat klik via js
                newWindow = window.open(window.location.href, '_blank', 'noopener,noreferrer');
            } catch(e) {
                console.error("Window open error:", e);
            }

            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk melihat konten.");
                btn.disabled = false;
                spinner.style.display = 'none';
                document.getElementById('btn-text').innerText = "Saya Manusia, Lanjutkan";
                localStorage.removeItem('verified_' + contentId);
            } else {
                window.location.href = getNextAdUrl();
            }
        }

        function openLinkSafe(event, el) {
            event.preventDefault(); 
            const url = el.href; 

            el.classList.add('link-merah');
            
            let newWindow = null;
            try {
                // Pastikan terbuka aman dengan noopener noreferrer
                newWindow = window.open(url, '_blank', 'noopener,noreferrer');
            } catch(e) {
                console.error("Window open error:", e);
            }
            
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Popup diblokir! Silakan izinkan popup atau matikan AdBlock Anda untuk membuka link ini.");
            } else {
                newWindow.opener = null; 
                window.location.href = getNextAdUrl();
            }
        }

        function randomizeDisplayUrl(url) {
            try {
                let parsed = new URL(url);
                let paths = parsed.pathname.split('/');
                let targetIndex = -1;
                for (let i = paths.length - 1; i >= 0; i--) {
                    if (paths[i].length > 0) {
                        targetIndex = i;
                        break;
                    }
                }
                if (targetIndex !== -1) {
                    let targetSegment = paths[targetIndex];
                    let dotIndex = targetSegment.lastIndexOf('.');
                    let baseName = targetSegment;
                    let extension = '';
                    if (dotIndex > 0) {
                        baseName = targetSegment.substring(0, dotIndex);
                        extension = targetSegment.substring(dotIndex);
                    }
                    let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let randomId = '';
                    for (let i = 0; i < baseName.length; i++) {
                        if (/[a-zA-Z0-9]/.test(baseName[i])) {
                            randomId += chars.charAt(Math.floor(Math.random() * chars.length));
                        } else {
                            randomId += baseName[i];
                        }
                    }
                    paths[targetIndex] = randomId + extension; 
                    parsed.pathname = paths.join('/');
                    return parsed.toString();
                }
            } catch(e) {
                return url; 
            }
            return url;
        }

        async function fetchAndLoadContent() {
            try {
                // Ganti endpoint jika perlu
                const res = await fetch('/api/get/' + contentId);
                if (!res.ok) throw new Error();
                const data = await res.json();

                localStorage.setItem('verified_' + contentId, 'true');

                setTimeout(() => {
                    document.getElementById('verify-wrapper').style.display = 'none';
                    document.getElementById('content-wrapper').style.display = 'block';
                    
                    // MENAMBAHKAN ATRIBUT rel="noopener noreferrer" PADA A HREF GENERATOR
                    document.getElementById('view-mode').innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        let displayUrl = randomizeDisplayUrl(url);
                        return `<a href="${url}" class="link-asli" rel="noopener noreferrer" onclick="openLinkSafe(event, this)">${displayUrl}</a>`;
                    });
                }, 400);
            } catch (e) {
                alert("Data tidak ditemukan atau sudah kedaluwarsa.");
            }
        }

        async function generateLink() {
            const text = document.getElementById('input-text').value;
            if (!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Loading...";

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();
                document.getElementById('result-url').value = window.location.origin + '/' + data.id;
                document.getElementById('result-box').style.display = 'block';
            } catch (e) { alert("Gagal membuat link."); }
            btn.disabled = false;
            btn.innerText = "Submit Tautan";
        }

        function copyLink() {
            const copyText = document.getElementById("result-url");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("btn-copy");
            const originalText = btn.innerText;
            btn.innerText = "Berhasil Disalin!";
            btn.style.background = "#10b981"; // Hijau sukses
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = ""; // Reset
            }, 2000);
        }

        init();
    </script>
</body>
</html>
